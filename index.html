<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HKU Campus Map</title>
  <style>
    :root{
      --bg:#f8fafc;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --blue:#2563eb;
      --map-ratio: 1.6;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:100;
      background:#fff;
      border-bottom:1px solid var(--line);
      padding:10px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      justify-content:space-between;
    }
    .left-controls,.right-controls{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }

    button{
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      border-radius:10px;
      padding:8px 10px;
      cursor:pointer;
      font-size:14px;
    }
    button.active{
      background:#eff6ff;
      border-color:#93c5fd;
      color:#1d4ed8;
      font-weight:600;
    }

    .layout{
      display:grid;
      grid-template-columns:minmax(0,1fr) 360px;
      gap:12px;
      padding:12px;
      height:calc(100vh - 72px);
    }

    .map-panel,.list-panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      min-height:0;
    }

    .map-panel{
      display:flex;
      flex-direction:column;
      overflow:hidden;
      position:relative;
    }

    .map-header{
      padding:12px 12px 8px;
      border-bottom:1px solid var(--line);
    }
    .map-title{
      font-weight:700;
      font-size:16px;
      margin-bottom:4px;
    }
    .map-note{
      color:var(--muted);
      font-size:13px;
    }

    .mode-tools{
      padding:8px 12px;
      border-bottom:1px solid var(--line);
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }
    #filterBar{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .chip{
      font-size:13px;
      padding:6px 10px;
      border-radius:999px;
    }

    .route-buttons{
      display:none;
      gap:8px;
      flex-wrap:wrap;
    }
    .route-buttons.show{display:flex}

    .map-shell{
      position:relative;
      padding:10px;
      min-height:0;
      flex:1 1 auto;
    }

    #campusMapWrap{
      position:relative;
      width:100%;
      aspect-ratio:var(--map-ratio);
      max-height:100%;
      margin:0 auto;
      border:1px solid var(--line);
      border-radius:12px;
      overflow:hidden;
      background:#fff;
      touch-action:none;
    }

    #mapStage{
      position:absolute;
      inset:0;
      transform-origin:0 0;
      will-change:transform;
    }

    #mapImage{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:contain;
      user-select:none;
      -webkit-user-drag:none;
      pointer-events:none;
    }

    #routeLayer{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      viewBox:0 0 100 100;
      preserveAspectRatio:none;
      pointer-events:none;
    }

    .marker{
      position:absolute;
      transform:translate(-50%,-100%);
      width:34px;
      height:34px;
      border-radius:999px;
      border:1px solid #cbd5e1;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      box-shadow:0 4px 10px rgba(2,6,23,.12);
      z-index:20;
      padding:0;
    }
    .marker.active{
      outline:2px solid #60a5fa;
      outline-offset:2px;
    }
    .marker.here{
      background:#fef2f2;
      border-color:#fca5a5;
    }
    .marker.walker{
      background:#eff6ff;
      border-color:#93c5fd;
      z-index:29;
    }

    #popup{
      position:absolute;
      display:none;
      z-index:70;
      width:min(320px,90vw);
      background:#fff;
      border:1px solid var(--line);
      border-radius:12px;
      box-shadow:0 12px 24px rgba(2,6,23,.18);
      padding:10px;
      font-size:14px;
      line-height:1.4;
      max-height:70%;
      overflow:auto;
    }
    .popup-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      font-weight:700;
      margin-bottom:8px;
    }
    .popup-close{
      border:none;
      background:transparent;
      font-size:18px;
      line-height:1;
      padding:0 4px;
      display:none;
    }
    .popup-row{margin:4px 0;color:#1e293b}
    .popup-more{
      margin-top:8px;
      width:100%;
    }

    #routeHint{
      position:absolute;
      left:20px;
      bottom:20px;
      z-index:50;
      background:rgba(15,23,42,.9);
      color:#fff;
      padding:9px 12px;
      border-radius:10px;
      font-size:13px;
      display:none;
      max-width:min(520px,90%);
    }

    .list-panel{
      display:flex;
      flex-direction:column;
      min-height:0;
      position:relative;
    }

    .list-head{
      padding:12px;
      border-bottom:1px solid var(--line);
    }
    .list-title{
      font-weight:700;
      margin-bottom:4px;
    }
    .list-sub{
      font-size:12px;
      color:var(--muted);
    }

    .list{
      list-style:none;
      margin:0;
      padding:8px;
      overflow-y:auto;
      flex:1 1 auto;
      min-height:0;
      scrollbar-gutter:stable;
    }
    .list li{margin:0 0 8px}
    .list button{
      width:100%;
      text-align:left;
      background:#fff;
      border:1px solid #e2e8f0;
      border-radius:10px;
      padding:10px;
      line-height:1.35;
    }
    .list button.active{
      background:#eff6ff;
      border-color:#93c5fd;
      color:#1e3a8a;
    }
    .list .n{font-weight:700}
    .list .m{font-size:12px;color:#64748b;margin-top:4px}
    .list .w{font-size:12px;margin-top:4px}

    /* Desktop scrollbar (requested) */
    @media (min-width:769px){
      #restaurantList::-webkit-scrollbar{width:10px}
      #restaurantList::-webkit-scrollbar-track{background:#f1f5f9;border-radius:8px}
      #restaurantList::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:8px}
      #restaurantList::-webkit-scrollbar-thumb:hover{background:#64748b}
      #restaurantList{
        scrollbar-width:thin;
        scrollbar-color:#94a3b8 #f1f5f9;
      }
    }

    .mobile-tabs{
      display:none;
      gap:8px;
      padding:8px 12px;
      border-bottom:1px solid var(--line);
      background:#fff;
    }

    .drawer-handle{
      display:none;
      text-align:center;
      font-size:12px;
      color:#64748b;
      padding:8px;
      border-bottom:1px solid var(--line);
      background:#fff;
      user-select:none;
    }

    .station-prompt{
      position:fixed;
      inset:0;
      background:rgba(15,23,42,.45);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:200;
      padding:16px;
    }
    .station-prompt.show{display:flex}
    .station-card{
      width:min(420px,94vw);
      background:#fff;
      border-radius:14px;
      border:1px solid var(--line);
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .station-title{font-weight:700;margin-bottom:4px}
    .station-card button{width:100%;text-align:left}

    @media (max-width:768px){
      .topbar{padding:8px}
      .layout{
        grid-template-columns:1fr;
        height:calc(100vh - 66px);
        padding:8px;
      }

      .map-panel{min-height:0}
      .map-shell{padding:8px}
      #campusMapWrap{
        width:100%;
        height:calc(100vh - 240px);
        max-height:none;
        aspect-ratio:auto;
      }

      .mobile-tabs{display:flex}
      .drawer-handle{display:block}

      #popup.mobile-sheet{
        left:8px !important;
        right:8px;
        bottom:8px;
        top:auto !important;
        width:auto;
        max-height:52vh;
      }
      #popup.mobile-sheet .popup-close{display:inline-block}

      #listPanel{
        position:fixed;
        left:8px;
        right:8px;
        bottom:8px;
        height:55vh;
        border-radius:14px;
        z-index:120;
        transform:translateY(calc(100% - 42px));
        transition:transform .22s ease;
        box-shadow:0 10px 24px rgba(2,6,23,.2);
      }
      #listPanel.open{
        transform:translateY(0);
      }

      body.route-mobile #listPanel,
      body.route-mobile .mobile-tabs{
        display:none;
      }

      body.route-mobile-fs .map-panel{
        position:fixed;
        inset:66px 8px 8px 8px;
        z-index:130;
      }
    }
  </style>
</head>

function positionPopup(anchorEl){
  const wrapRect = mapWrap.getBoundingClientRect();
  const aRect = anchorEl.getBoundingClientRect();

  const x = (aRect.left - wrapRect.left) + aRect.width / 2;
  const y = (aRect.top - wrapRect.top) + aRect.height / 2;

  const pad = 8, gap = 10;
  const w = popup.offsetWidth, h = popup.offsetHeight;

  let left = x + gap;
  let top = y - 8;
  if (left + w > wrapRect.width - pad) left = x - w - gap;
  if (left < pad) left = pad;
  if (top < pad) top = pad;
  if (top + h > wrapRect.height - pad) top = wrapRect.height - h - pad;

  popup.style.left = left + 'px';
  popup.style.top = top + 'px';
}

function openPopup(anchorEl, html){
  if (!anchorEl) return;
  popup.innerHTML = html;
  popup.style.display = 'block';

function pathMetrics(path){
  const cum=[0];
  for(let i=1;i<path.length;i++){
    const dx=path[i].x-path[i-1].x, dy=path[i].y-path[i-1].y;
    cum[i]=cum[i-1]+Math.hypot(dx,dy);
  }
  return {cum,total:cum[cum.length-1]};
}

function pointAt(path,cum,d){
  if (d<=0) return path[0];
  const total = cum[cum.length-1];
  if (d >= total) return path[path.length - 1];

  let i=1;
  while(i<cum.length && cum[i]<d) i++;
  const d0=cum[i-1], d1=cum[i];
  const tt=(d-d0)/(d1-d0);

  return {
    x: path[i-1].x + (path[i].x - path[i-1].x) * tt,
    y: path[i-1].y + (path[i].y - path[i-1].y) * tt
  };
}

  currentPopupPoint = null;

  const ns = "http://www.w3.org/2000/svg";

  poly.setAttribute("stroke", "#2563eb");
  poly.setAttribute("stroke-width", "1.15");
  poly.setAttribute("stroke-linecap", "round");
  poly.setAttribute("stroke-linejoin", "round");
  routeLayer.appendChild(poly);

  const start = route.path[0];
  const end = route.path[route.path.length - 1];

  const startDot = document.createElementNS(ns, "circle");
  startDot.setAttribute("cx", start.x);
  startDot.setAttribute("cy", start.y);
  startDot.setAttribute("r", "1.1");
  startDot.setAttribute("fill", "#0ea5e9");
  routeLayer.appendChild(startDot);

  const endDot = document.createElementNS(ns, "circle");
  endDot.setAttribute("cx", end.x);
  endDot.setAttribute("cy", end.y);
  endDot.setAttribute("r", "1.25");
  endDot.setAttribute("fill", "#dc2626");
  routeLayer.appendChild(endDot);

  walkerEl = document.createElement('button');
  walkerEl.className = 'marker walker';
  walkerEl.style.left = `${start.x}%`;
  walkerEl.style.top = `${start.y}%`;
  walkerEl.style.zIndex = '29';
  walkerEl.textContent = '🚶';
  walkerEl.title = 'Replay route';
  walkerEl.addEventListener('pointerdown', e => e.stopPropagation());
  walkerEl.addEventListener('click', (e) => {
    e.stopPropagation();
    drawRouteToKKL(stationKey);
  });
  mapStage.appendChild(walkerEl);

  showRouteHint(`${t('routeFollowPrefix')} ${routeName(route)}: ${t('routeFollowSuffix')}`);

  const xs = route.path.map(p => p.x);
  const ys = route.path.map(p => p.y);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const centerX = (minX + maxX) / 2;
  const centerY = (minY + maxY) / 2;
  zoomToPoint(centerX, centerY, isMobile() ? 1.25 : 1.45);

  const {cum,total} = pathMetrics(route.path);
  const milestones = (route.milestones || []).map(m => ({
    d: cum[m.index],
    shown: false,
    message: i18nMessage(m.message)
  }));

  const duration = 11000;
  const t0 = performance.now();

  function frame(now){
    const prog = Math.min((now - t0) / duration, 1);
    const d = total * prog;
    const pt = pointAt(route.path, cum, d);

    walkerEl.style.left = `${pt.x}%`;
    walkerEl.style.top = `${pt.y}%`;

    milestones.forEach(m => {
      if (!m.shown && d >= m.d){
        m.shown = true;
        showRouteHint(m.message);
      }
    });

    if (prog < 1){
      routeAnimId = requestAnimationFrame(frame);
    } else {
      routeAnimId = null;
      showRouteHint(t('arrived'));

      if (isMobile() && currentMode === 'route'){
        if (routeFsExitTimer) clearTimeout(routeFsExitTimer);
        routeFsExitTimer = setTimeout(() => {
          setRouteFullscreen(false);
        }, 3000);
      }
    }
  }
  routeAnimId = requestAnimationFrame(frame);
}

// ---------------- MOBILE ROUTE FULLSCREEN ----------------
function setRouteFullscreen(on){
  if (!isMobile()) return;
  document.body.classList.toggle('route-mobile-fs', on);
}

function updateMobileRouteUI(){
  const inRouteMobile = isMobile() && currentMode === 'route';
  document.body.classList.toggle('route-mobile', inRouteMobile);

  if (!inRouteMobile){
    setRouteFullscreen(false);
    if (routeFsExitTimer){
      clearTimeout(routeFsExitTimer);
      routeFsExitTimer = null;
    }
  } else {
    listPanel?.classList.remove('open');
    setMobileTab('map');
  }
}

// ---------------- LANGUAGE ----------------
function applyStaticUIText(){
  foodModeBtn.textContent = t('foodBtn');
  visitModeBtn.textContent = t('visitBtn');
  routeModeBtn.textContent = t('routeBtn');
  resetZoomBtn.textContent = t('resetZoom');
  mapTabBtn.textContent = t('mapTab');
  listTabBtn.textContent = t('listTab');
  routeFromSypBtn.textContent = t('routeFromSyp');
  routeFromHkuBtn.textContent = t('routeFromHku');
  drawerHandle.textContent = t('drawerHandle');

  stationPromptTitle.textContent = t('promptTitle');
  stationSypBtn.textContent = t('promptSyp');
  stationHkuBtn.textContent = t('promptHku');
  cancelStationPrompt.textContent = t('cancel');

  langEnBtn.classList.toggle('active', currentLang === 'en');
  langZhBtn.classList.toggle('active', currentLang === 'zh');
}

function setLanguage(lang){
  currentLang = lang;
  applyStaticUIText();
  switchMode(currentMode);

  if (currentMode === 'route' && lastRouteStationKey){
    drawRouteToKKL(lastRouteStationKey);
  }

  if (hereMarkerEl){
    hereMarkerEl.title = t('kklBuilding');
  }
}

// ---------------- MODE ----------------
function switchMode(mode){
  currentMode = mode;
  selectedTypes = null;
  clearRoute();
  popup.style.display = 'none';
  activeAnchorEl = null;
  currentPopupPoint = null;
  popupExpanded = false;
  clearActive();

  foodModeBtn.classList.toggle('active', mode==='food');
  visitModeBtn.classList.toggle('active', mode==='visit');
  routeModeBtn.classList.toggle('active', mode==='route');

  if (mode === 'route'){
    mapTitle.textContent = t('routeTitle');
    mapNote.textContent = t('routeNote');
    listLabel.textContent = '';
    listSubNote.textContent = '';

    routeButtons?.classList.add('show');

    removePoiMarkers();
    createRouteStartMarkers();
    list.innerHTML = '';
    listCount.textContent = '0';
    filterBar.innerHTML = '';

    resetView();
    stationPrompt.classList.remove('show');
    showRouteHint(t('routePickHint'));

    if (isMobile()) setMobileTab('map');
    updateMobileRouteUI();
    return;
  }

  routeButtons?.classList.remove('show');
  routeFromSypBtn?.classList.remove('active');
  routeFromHkuBtn?.classList.remove('active');

  clearRouteStartMarkers();
  stationPrompt.classList.remove('show');

  const data = getActiveData();
  mapTitle.textContent = dsText(data, 'title');
  mapNote.textContent = dsText(data, 'note');
  listLabel.textContent = dsText(data, 'listLabel');
  listSubNote.textContent = dsText(data, 'listSubNote') || '';

  removePoiMarkers();
  data.items.forEach(createMarker);
  renderList();
  renderFilterBar();
  applyFilter();
  resetView();

  updateMobileRouteUI();
}

// ---------------- MOBILE MAP/LIST TABS ----------------
function toggleListOpen(open){
  if (!isMobile()) return;
  if (currentMode === 'route') return;
  listPanel.classList.toggle('open', open);
  mapTabBtn.classList.toggle('active', !open);
  listTabBtn.classList.toggle('active', open);
}

function setMobileTab(tab){
  if (!isMobile()) return;
  toggleListOpen(tab === 'list');
}

mapTabBtn?.addEventListener('click', ()=> setMobileTab('map'));
listTabBtn?.addEventListener('click', ()=> setMobileTab('list'));

drawerHandle?.addEventListener('click', ()=>{
  if (!isMobile()) return;
  if (currentMode === 'route') return;
  const open = !listPanel.classList.contains('open');
  toggleListOpen(open);
});

// swipe support on mobile drawer handle
let handleTouchStartY = null;
let handleTouchDeltaY = 0;
const SWIPE_OPEN_THRESHOLD = 35;
const SWIPE_CLOSE_THRESHOLD = 45;

drawerHandle?.addEventListener('touchstart', (e) => {
  if (!isMobile() || currentMode === 'route') return;
  if (!e.touches || e.touches.length !== 1) return;
  handleTouchStartY = e.touches[0].clientY;
  handleTouchDeltaY = 0;
}, { passive: true });

drawerHandle?.addEventListener('touchmove', (e) => {
  if (handleTouchStartY == null) return;
  handleTouchDeltaY = e.touches[0].clientY - handleTouchStartY;
}, { passive: true });

drawerHandle?.addEventListener('touchend', () => {
  if (!isMobile() || currentMode === 'route') {
    handleTouchStartY = null;
    return;
  }

  if (handleTouchDeltaY < -SWIPE_OPEN_THRESHOLD) {
    toggleListOpen(true); // swipe up
  } else if (handleTouchDeltaY > SWIPE_CLOSE_THRESHOLD) {
    toggleListOpen(false); // swipe down
  }

  handleTouchStartY = null;
  handleTouchDeltaY = 0;
}, { passive: true });

// ---------------- EVENTS ----------------
foodModeBtn.addEventListener('click', ()=>switchMode('food'));
visitModeBtn.addEventListener('click', ()=>switchMode('visit'));
routeModeBtn.addEventListener('click', ()=>switchMode('route'));

langEnBtn.addEventListener('click', ()=> setLanguage('en'));
langZhBtn.addEventListener('click', ()=> setLanguage('zh'));

routeFromSypBtn?.addEventListener('click', () => drawRouteToKKL('sypC'));
routeFromHkuBtn?.addEventListener('click', () => drawRouteToKKL('hkuA2'));

cancelStationPrompt.addEventListener('click', ()=> stationPrompt.classList.remove('show'));
stationPrompt.querySelectorAll('[data-station]').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    stationPrompt.classList.remove('show');
    drawRouteToKKL(btn.dataset.station);
  });
});

popup.addEventListener('click', (e)=>{
  const closeBtn = e.target.closest('[data-popup-close="1"]');
  if (closeBtn){
    e.stopPropagation();
    popup.style.display = 'none';
    activeAnchorEl = null;
    currentPopupPoint = null;
    popupExpanded = false;
    return;
  }

  const moreBtn = e.target.closest('[data-popup-more="1"]');
  if (!moreBtn) return;
  e.stopPropagation();
  if (!currentPopupPoint) return;
  popupExpanded = true;
  openPopup(activeAnchorEl, popupHTML(currentPopupPoint, true));
});

resetZoomBtn.addEventListener('click', ()=>{
  resetView();
  popup.style.display = 'none';
  activeAnchorEl = null;
  currentPopupPoint = null;
  popupExpanded = false;
  clearActive();
});

mapWrap.addEventListener('click', (e)=>{
  if (e.target.closest('.marker')) return;
  if (popup.contains(e.target)) return;
  popup.style.display = 'none';
  activeAnchorEl = null;
  currentPopupPoint = null;
  popupExpanded = false;
  clearActive();
});

mapWrap.addEventListener('wheel', (e)=>{
  if (currentMode === 'route') return;
  e.preventDefault();
  const delta = e.deltaY < 0 ? 0.14 : -0.14;
  zoomAt(e.clientX, e.clientY, scale + delta);
}, {passive:false});

let dragging = false;
let lastX = 0, lastY = 0;
let pinchStartDist = 0;
let pinchStartScale = 1;
let pinchCenter = null;

function touchDist(t1,t2){
  const dx=t1.clientX-t2.clientX, dy=t1.clientY-t2.clientY;
  return Math.hypot(dx,dy);
}
function touchCenter(t1,t2){
  return {x:(t1.clientX+t2.clientX)/2, y:(t1.clientY+t2.clientY)/2};
}

mapWrap.addEventListener('pointerdown', (e)=>{
  if (e.pointerType === 'mouse' && e.button !== 0) return;
  if (e.target.closest('.marker')) return;
  if (popup.contains(e.target)) return;
  if (scale <= 1) return;

  dragging = true;
  lastX = e.clientX; lastY = e.clientY;
  mapWrap.setPointerCapture(e.pointerId);
});

mapWrap.addEventListener('pointermove', (e)=>{
  if (!dragging) return;
  tx += (e.clientX - lastX);
  ty += (e.clientY - lastY);
  lastX = e.clientX; lastY = e.clientY;
  clampPan();
  applyTransform();
});

mapWrap.addEventListener('pointerup', ()=> dragging=false);
mapWrap.addEventListener('pointercancel', ()=> dragging=false);

mapWrap.addEventListener('touchstart', (e)=>{
  if (e.touches.length === 2){
    pinchStartDist = touchDist(e.touches[0], e.touches[1]);
    pinchStartScale = scale;
    pinchCenter = touchCenter(e.touches[0], e.touches[1]);
  }
}, {passive:true});

mapWrap.addEventListener('touchmove', (e)=>{
  if (e.touches.length === 2){
    e.preventDefault();
    const d = touchDist(e.touches[0], e.touches[1]);
    const ratio = d / pinchStartDist;
    zoomAt(pinchCenter.x, pinchCenter.y, pinchStartScale * ratio);
  }
}, {passive:false});

window.addEventListener('resize', ()=>{
  syncMapRatioFromImage();
  clampPan();
  applyTransform();

  if (!isMobile()){
    listPanel.classList.remove('open');
  }
  if (popup.style.display === 'block' && activeAnchorEl && !isMobile()){
    positionPopup(activeAnchorEl);
  }

  updateMobileRouteUI();
});

// ---------------- INIT ----------------
const mobileTabs = document.querySelector('.mobile-tabs');
if (isMobile() && mobileTabs && mapWrap && mapWrap.parentNode) {
  mapWrap.parentNode.insertBefore(mobileTabs, mapWrap);
}

if (mapImage.complete) syncMapRatioFromImage();
else mapImage.addEventListener('load', syncMapRatioFromImage);

createHereMarker();
setLanguage('en');
switchMode('food');
applyTransform();
if (isMobile()) setMobileTab('map');
updateMobileRouteUI();
   </script>
</body>
