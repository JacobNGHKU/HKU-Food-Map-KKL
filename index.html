<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HKU Campus Map</title>
  <style>
    :root{
      --bg:#f7f8fc;
      --panel:#ffffff;
      --line:#d8deea;
      --text:#1a2b49;
      --muted:#5f6f8f;
      --brand:#1f4ea3;
      --chip:#eef3ff;
      --drawer-peek: 92px;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
      color:var(--text);
      background:var(--bg);
    }

    .container{
      width:min(1400px, 96vw);
      margin:16px auto 24px;
    }

    .header{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
      margin-bottom:12px;
    }
    .header h1{
      margin:0 0 8px;
      font-size:22px;
    }
    .header p{
      margin:0;
      color:var(--muted);
      font-size:14px;
    }

    .mode-switch{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .mobile-tabs{
      display:none;
      margin-top:10px;
      gap:8px;
    }

    .btn{
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      border-radius:10px;
      padding:8px 12px;
      cursor:pointer;
      font-weight:600;
      font-size:14px;
    }
    .btn:hover{ border-color:#b9c7e3; }
    .btn.active{
      background:#1f4ea3;
      color:#fff;
      border-color:#1f4ea3;
    }

    .toolbar{
      margin-top:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .layout{
      display:grid;
      grid-template-columns: minmax(280px, 360px) 1fr;
      gap:12px;
      align-items:start;
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
    }

    .list-panel{
      position:relative;
      z-index:20;
    }
    .list-panel h3{
      margin:0 0 4px;
      font-size:18px;
    }
    .list-panel .small{
      color:var(--muted);
      margin:0 0 10px;
      font-size:13px;
    }

    .drawer-handle{
      display:none;
      width:100%;
      padding:4px 0 8px;
      cursor:grab;
      touch-action:none;
    }
    .drawer-handle span{
      display:block;
      width:44px;
      height:5px;
      border-radius:99px;
      margin:0 auto;
      background:#c9d4ea;
    }

    #filterBar{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:10px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border:1px solid var(--line);
      background:var(--chip);
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      color:#1f3767;
      user-select:none;
    }
    .chip input{ margin:0; }

    .list{
      list-style:none;
      margin:0;
      padding:0;
      max-height:72vh;
      overflow:auto;
    }
    .list li{ margin:0 0 8px; }
    .list button{
      width:100%;
      text-align:left;
      border:1px solid var(--line);
      background:#fff;
      border-radius:10px;
      padding:10px;
      cursor:pointer;
    }
    .list button:hover{ border-color:#b7c8ee; }
    .list button.active{
      border-color:#1f4ea3;
      box-shadow:0 0 0 2px rgba(31,78,163,.15);
    }
    .name{ font-weight:700; font-size:14px; margin-bottom:4px; }
    .meta{ color:var(--muted); font-size:12px; line-height:1.35; }

    .map-panel h2{
      margin:0 0 6px;
      font-size:20px;
    }
    .map-note{
      margin:0 0 10px;
      color:var(--muted);
      font-size:13px;
    }

    .map-wrap{
      position:relative;
      width:100%;
      aspect-ratio: 16 / 10;
      border:1px solid var(--line);
      border-radius:12px;
      overflow:hidden;
      background:#fff;
      touch-action:none;
    }

    #mapStage{
      position:relative;
      width:100%;
      height:100%;
      transform-origin:0 0;
      transform:translate(0px,0px) scale(1);
      transition:transform .18s ease;
      will-change:transform;
    }

    #campusMap{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      user-select:none;
      -webkit-user-drag:none;
      pointer-events:auto;
      background:#f0f4ff;
    }

    .zoom-controls{
      position:absolute;
      right:10px;
      top:10px;
      z-index:90;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .zoom-controls .btn{
      width:40px;
      height:40px;
      padding:0;
      border-radius:10px;
      font-size:20px;
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .route-layer{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:15;
      pointer-events:none;
    }
    .route-line{
      fill:none;
      stroke:#1f4ea3;
      stroke-width:0.85;
      stroke-linecap:round;
      stroke-linejoin:round;
      stroke-dasharray:2 1.2;
    }
    .route-start-dot{ fill:#0ea5e9; }
    .route-end-dot{ fill:#1f4ea3; }

    .marker{
      position:absolute;
      transform:translate(-50%, -50%);
      width:28px;
      height:28px;
      border-radius:50%;
      border:1px solid #bfd0f2;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:16px;
      cursor:pointer;
      z-index:25;
      box-shadow:0 3px 10px rgba(0,0,0,.14);
    }
    .marker:hover{ transform:translate(-50%, -50%) scale(1.06); }
    .marker.active{
      border:2px solid #1f4ea3;
      box-shadow:0 0 0 3px rgba(31,78,163,.18);
    }
    .marker.here{
      border:2px solid #ef4444;
      z-index:30;
      width:30px;
      height:30px;
    }
    .marker.walker{
      background:#fff;
      border:2px solid #1f4ea3;
      width:30px;
      height:30px;
      z-index:32;
      cursor:default;
    }

    .popup{
      position:absolute;
      z-index:70;
      min-width:240px;
      max-width:min(380px, 88vw);
      background:#fff;
      border:1px solid var(--line);
      border-radius:10px;
      padding:10px;
      box-shadow:0 10px 24px rgba(0,0,0,.22);
      display:none;
      font-size:13px;
      line-height:1.4;
    }
    .popup h4{ margin:0 0 6px; font-size:14px; }
    .popup p{ margin:0 0 4px; }

    .legend{
      margin-top:10px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .walk-time{
      display:inline-block;
      border-radius:999px;
      padding:2px 8px;
      font-size:12px;
      font-weight:700;
      border:1px solid transparent;
    }
    .walk-green{ color:#0f6b2d; background:#e9f9ee; border-color:#bceacb; }
    .walk-orange{ color:#8a5300; background:#fff4e5; border-color:#f7d7a6; }
    .walk-red{ color:#8f1d1d; background:#ffeaea; border-color:#f5baba; }

    #mapSection.route-mode .layout{ grid-template-columns:1fr; }
    #mapSection.route-mode .list-panel,
    #mapSection.route-mode #filterBar,
    #mapSection.route-mode #legend{ display:none; }

    .route-hint{
      position:absolute;
      left:50%;
      bottom:14px;
      transform:translateX(-50%);
      z-index:80;
      background:#ffffff;
      border:2px solid #1f4ea3;
      border-radius:14px;
      padding:12px 16px;
      box-shadow:0 12px 28px rgba(0,0,0,.25);
      font-size:16px;
      font-weight:700;
      color:#0d2f6f;
      text-align:center;
      width:min(90%, 620px);
      pointer-events:none;
      display:none;
    }

    .prompt-backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.35);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:200;
    }
    .prompt-backdrop.show{ display:flex; }
    .prompt-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:12px;
      padding:16px;
      width:min(92vw, 420px);
      box-shadow:0 10px 24px rgba(0,0,0,.25);
    }
    .prompt-actions{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:8px;
    }

    .popup.mobile-sheet{
      position:fixed !important;
      left:12px !important;
      right:12px !important;
      bottom:12px !important;
      top:auto !important;
      width:auto !important;
      max-width:none !important;
      max-height:45vh;
      overflow:auto;
      border-radius:14px;
      z-index:320;
    }

    a{ color:#1f4ea3; }

    @media (max-width: 768px){
      .container{
        width:100vw;
        margin:0;
        padding:8px;
      }

      .header,.panel{
        border-radius:12px;
        padding:10px;
      }

      .layout{
        display:block;
      }

      .map-panel{ margin-bottom:10px; }

      .map-wrap{
        aspect-ratio: 3 / 4;
      }

      .toolbar{
        align-items:stretch;
      }
      .toolbar .btn{
        width:100%;
        min-height:44px;
      }

      .btn,.list button,.chip{
        min-height:44px;
        font-size:15px;
      }

      #filterBar{
        flex-wrap:nowrap;
        overflow-x:auto;
        -webkit-overflow-scrolling:touch;
        padding-bottom:4px;
      }
      #filterBar .chip{
        white-space:nowrap;
        flex:0 0 auto;
      }

      .mobile-tabs{
        display:flex;
      }
      .mobile-tabs .btn{
        flex:1;
      }

      #mapSection:not(.route-mode) .list-panel{
        position:fixed;
        left:8px;
        right:8px;
        bottom:8px;
        height:min(74vh, 620px);
        z-index:250;
        box-shadow:0 14px 30px rgba(0,0,0,.25);
        border-radius:14px 14px 12px 12px;
        touch-action:none;
      }

      #mapSection:not(.route-mode) .list{
        max-height:calc(74vh - 170px);
      }

      .drawer-handle{
        display:block;
      }

      .route-hint{
        font-size:14px;
        padding:10px 12px;
        width:min(94%, 560px);
      }

      #mapSection.route-mode .mobile-tabs{
        display:none;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="header">
      <h1>HKU Campus Map</h1>
      <p id="mapTitle">HKU Main Campus Map (Food Map)</p>

      <div class="mode-switch">
        <button class="btn active" id="foodModeBtn">🍱 Food Map</button>
        <button class="btn" id="visitModeBtn">🏛️ Visit Map</button>
        <button class="btn" id="routeModeBtn">🚶 To KKL</button>
      </div>

      <div class="toolbar">
        <p id="mapNote" style="margin:0;color:var(--muted);font-size:13px;">Walking time shown is from KKL Building.</p>
        <button class="btn" id="resetZoomBtn">Reset zoom</button>
      </div>

      <div class="mobile-tabs" id="mobileTabs">
        <button class="btn active" id="mobileMapTabBtn">🗺️ Map</button>
        <button class="btn" id="mobileListTabBtn">📋 List</button>
      </div>
    </section>

    <section id="mapSection">
      <div class="layout">
        <aside class="panel list-panel" id="listPanel">
          <div class="drawer-handle" id="drawerHandle" aria-label="Drag to open list"><span></span></div>
          <h3><span id="listLabel">Restaurant List</span> (<span id="listCount">0</span>)</h3>
          <p class="small">Select a point from the list or map.</p>
          <div id="filterBar"></div>
          <ul id="restaurantList" class="list"></ul>
        </aside>

        <section class="panel map-panel">
          <h2 id="mapTitleInline">HKU Main Campus Map</h2>
          <p class="map-note" id="mapNoteInline">Walking time shown is from KKL Building.</p>

          <div class="map-wrap" id="campusMapWrap">
            <div class="zoom-controls" id="zoomControls">
              <button class="btn" id="zoomInBtn" aria-label="Zoom in">＋</button>
              <button class="btn" id="zoomOutBtn" aria-label="Zoom out">－</button>
            </div>

            <div id="mapStage">
              <img id="campusMap" src="./Main-campus-Faculty-Induction-Talks-2025-scaled.jpg" alt="HKU Main Campus Map">
              <svg id="routeLayer" class="route-layer" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
              <div id="popup" class="popup"></div>
              <div id="routeHint" class="route-hint"></div>
            </div>
          </div>

          <div id="legend" class="legend"></div>
        </section>
      </div>
    </section>
  </div>

  <div id="stationPrompt" class="prompt-backdrop" role="dialog" aria-modal="true" aria-labelledby="stationPromptTitle">

        <button class="btn" data-station="hkuA2">🚉 HKU Station Exit A2</button>

    </div>
  </div>

    const mapSection = document.getElementById('mapSection');

    const markerById = new Map();

    function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }

    function applyZoom(){
      mapStage.style.transformOrigin = `${currentOrigin.x}% ${currentOrigin.y}%`;
      mapStage.style.transform = `scale(${currentScale})`;
    }

    function zoomToPoint(xPercent, yPercent, scale=1.8){
      currentOrigin.x = clamp(xPercent, 0, 100);
      currentOrigin.y = clamp(yPercent, 0, 100);
      currentScale = clamp(scale, MIN_SCALE, MAX_SCALE);
      applyZoom();
    }

    function walkColorClass(min){
      if (min <= 5) return 'walk-green';
      if (min <= 10) return 'walk-orange';
      return 'walk-red';
    }

    function walkTimeHTML(min){
      return `<span class="walk-time ${walkColorClass(min)}">🚶 ${min} min</span>`;
    }

    function getActiveData(){
      return DATASETS[currentMode === 'visit' ? 'visit' : 'food'];
    }

    function categoryLabel(type){
      const data = getActiveData();
      const c = data.categories.find(x => x.key === type);
      return c ? c.label : type;
    }

    function clearActive(){
      document.querySelectorAll('.marker.active').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.list button.active').forEach(el => el.classList.remove('active'));
    }

    function openPopupNearElement(anchorEl, html){
      if (!anchorEl) return;
      popup.innerHTML = html;
      popup.style.display = 'block';

      const wrapRect = mapWrap.getBoundingClientRect();
      const aRect = anchorEl.getBoundingClientRect();

      const x = (aRect.left - wrapRect.left) + (aRect.width / 2);
      const y = (aRect.top - wrapRect.top) + (aRect.height / 2);

      const pad = 8;
      const gap = 12;
      const popupW = popup.offsetWidth;
      const popupH = popup.offsetHeight;

      let left = x + gap;
      let top = y - 10;

      if (left + popupW > wrapRect.width - pad) left = x - popupW - gap;
      if (left < pad) left = pad;
      if (left + popupW > wrapRect.width - pad) left = wrapRect.width - popupW - pad;

      if (top < pad) top = pad;
      if (top + popupH > wrapRect.height - pad) top = wrapRect.height - popupH - pad;

      popup.style.left = `${left}px`;
      popup.style.top = `${top}px`;
      activeAnchorEl = anchorEl;
    }

    function pointPopupHTML(p){
      if (currentMode === 'food') {
        return `
          <h4>${p.id}. ${p.name}</h4>
          <p><strong>Building:</strong> ${p.building}</p>
          <p><strong>Location:</strong> ${p.location}</p>
          <p><strong>Type:</strong> ${categoryLabel(p.type)}</p>
          <p><strong>Food:</strong> ${p.food}</p>
          ${p.access ? `<p><strong>Access:</strong> ${p.access}</p>` : ''}
          <p><strong>Walk from KKL:</strong> ${walkTimeHTML(p.walkMin)}</p>
        `;
      }

      return `
        <h4>${p.id}. ${p.name}</h4>
        <p><strong>Category:</strong> ${categoryLabel(p.type)}</p>
        ${p.building ? `<p><strong>Building:</strong> ${p.building}</p>` : ''}
        ${p.location ? `<p><strong>Location:</strong> ${p.location}</p>` : ''}
        ${p.walkMin ? `<p><strong>Walk from KKL:</strong> ${walkTimeHTML(p.walkMin)}</p>` : ''}
        ${p.hours ? `<p><strong>Opening Hours:</strong> ${p.hours}</p>` : ''}
        ${p.bookingUrl ? `<p><strong>Book:</strong> <a href="${p.bookingUrl}" target="_blank" rel="noopener noreferrer">Visit booking page</a></p>` : ''}
        ${p.info ? `<p>${p.info}</p>` : ''}
      `;
    }

    function focusPoint(p){
      if (currentMode === 'route') return;

      clearActive();
      const marker = markerById.get(p.id);
      const listBtn = listBtnById.get(p.id);
      if (marker) marker.classList.add('active');
      if (listBtn) listBtn.classList.add('active');

      mapSection.scrollIntoView({ behavior:'smooth', block:'start' });
      zoomToPoint(p.x, p.y, 1.8);
      setTimeout(() => openPopupNearElement(marker, pointPopupHTML(p)), 180);
    }

    function removePoiMarkers(){
      document.querySelectorAll('.marker.poi').forEach(el => el.remove());
      markerById.clear();
    }

    function createMarker(p){
      const btn = document.createElement('button');
      btn.className = `marker poi`;
      btn.style.left = p.x + '%';
      btn.style.top = p.y + '%';
      btn.innerHTML = p.icon;
      btn.dataset.type = p.type;
      btn.dataset.id = p.id;
      btn.title = p.name;
      btn.setAttribute('aria-label', p.name);

      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        focusPoint(p);
      });

      markerById.set(p.id, btn);
      mapStage.appendChild(btn);
    }

    function createHereMarker(){
      if (hereMarkerEl) return;

      const here = document.createElement('button');
      here.className = 'marker here';
      here.style.left = `${HERE.x}%`;
      here.style.top = `${HERE.y + HERE.yOffset}%`;
      here.innerHTML = '📍';
      here.title = "I'm here (KKL Building)";
      here.setAttribute('aria-label', "I'm here (KKL Building)");

      here.addEventListener('click', (e) => {
        e.stopPropagation();
        clearActive();

        if (currentMode !== 'route') {
          mapSection.scrollIntoView({ behavior:'smooth', block:'start' });
          zoomToPoint(HERE.x, HERE.y, 2.0);

          setTimeout(() => {
            openPopupNearElement(here, `
              <h4>📍 You are at KKL Building</h4>
              <p>Use the map or list to explore nearby points.</p>
            `);
          }, 180);
        }
      });

      hereMarkerEl = here;
      mapStage.appendChild(here);
    }

    function createList(){
      list.innerHTML = '';
      listBtnById.clear();
      const data = getActiveData();

      data.items.forEach(p => {
        const li = document.createElement('li');
        const btn = document.createElement('button');
        btn.dataset.type = p.type;
        btn.dataset.id = p.id;

        if (currentMode === 'food') {
          btn.innerHTML = `
            <div class="name">${p.icon} ${p.id}. ${p.name}</div>
            <div class="meta">${p.location}, ${p.building}</div>
            <div class="meta">${p.food}</div>
            ${p.access ? `<div class="meta"><strong>Access:</strong> ${p.access}</div>` : ''}
            <div class="meta">${walkTimeHTML(p.walkMin)} walk from KKL</div>
          `;
        } else {
          btn.innerHTML = `
            <div class="name">${p.icon} ${p.id}. ${p.name}</div>
            <div class="meta">${categoryLabel(p.type)}</div>
            ${p.building ? `<div class="meta">${p.location ? `${p.location}, ` : ''}${p.building}</div>` : ''}
            ${p.walkMin ? `<div class="meta">${walkTimeHTML(p.walkMin)} walk from KKL</div>` : ''}
            ${p.hours ? `<div class="meta">${p.hours}</div>` : ''}
            ${p.bookingUrl ? `<div class="meta"><a href="${p.bookingUrl}" target="_blank" rel="noopener noreferrer">Booking link</a></div>` : ''}
            ${p.info ? `<div class="meta">${p.info}</div>` : ''}
          `;
        }

        btn.addEventListener('click', () => focusPoint(p));
        li.appendChild(btn);
        list.appendChild(li);
        listBtnById.set(p.id, btn);
      });
    }

    function renderFilterBar(){
      const data = getActiveData();
      filterBar.innerHTML = '';

      const all = document.createElement('label');
      all.className = 'chip';
      all.innerHTML = `<input type="checkbox" value="all" checked> All`;
      filterBar.appendChild(all);

      data.categories.forEach(cat => {
        const label = document.createElement('label');
        label.className = 'chip';
        label.innerHTML = `<input type="checkbox" value="${cat.key}" checked> ${cat.icon} ${cat.label}`;
        filterBar.appendChild(label);
      });

      const checks = filterBar.querySelectorAll('input[type="checkbox"]');
      const allBox = filterBar.querySelector('input[value="all"]');

      checks.forEach(c => {
        c.addEventListener('change', (e) => {
          if (e.target.value === 'all') {
            checks.forEach(x => x.checked = e.target.checked);
          } else {
            const nonAll = [...checks].filter(x => x.value !== 'all');
            allBox.checked = nonAll.every(x => x.checked);
          }
          applyFilter();
        });
      });
    }

    function renderLegend(){
      const data = getActiveData();
      legend.innerHTML = '';

      data.categories.forEach(cat => {
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.innerHTML = `${cat.icon} ${cat.label}`;
        legend.appendChild(chip);
      });

      if (currentMode === 'food') {
        const extra = document.createElement('span');
        extra.className = 'chip';
        extra.innerHTML = `🍽️ Staff/Members only`;
        legend.appendChild(extra);
      }

      const here = document.createElement('span');
      here.className = 'chip';
      here.innerHTML = `📍 I’m here (KKL)`;
      legend.appendChild(here);
    }

    function selectedTypes(){
      const checks = filterBar.querySelectorAll('input[type="checkbox"]');
      const allBox = filterBar.querySelector('input[value="all"]');
      const allChecked = allBox ? allBox.checked : true;
      const chosen = [...checks]
        .filter(c => c.checked && c.value !== 'all')
        .map(c => c.value);
      return { allChecked, chosen };
    }

    function applyFilter(){
      if (currentMode === 'route') return;

      const data = getActiveData();
      const { allChecked, chosen } = selectedTypes();
      let visibleCount = 0;

      data.items.forEach(p => {
        const show = allChecked || chosen.includes(p.type);
        const marker = markerById.get(p.id);
        const liBtn = listBtnById.get(p.id);

        if (marker) marker.style.display = show ? 'flex' : 'none';
        if (liBtn) liBtn.closest('li').style.display = show ? 'block' : 'none';
        if (show) visibleCount++;
      });

      listCount.textContent = visibleCount;
      popup.style.display = 'none';
      activeAnchorEl = null;
      clearActive();
    }

    // ---------------------------
    // ROUTE MODE HELPERS
    // ---------------------------
    function showRouteHint(msg){
      routeHint.textContent = msg;
      routeHint.style.display = 'block';
    }

    function hideRouteHint(){
      routeHint.style.display = 'none';
      routeHint.textContent = '';
    }

    function clearRoute(){
      routeLayer.innerHTML = '';
      if (walkerEl) { walkerEl.remove(); walkerEl = null; }
      if (stationEl) { stationEl.remove(); stationEl = null; }
      if (routeAnimId) { cancelAnimationFrame(routeAnimId); routeAnimId = null; }
      hideRouteHint();
    }

    function pathMetrics(path){
      const cum = [0];
      for (let i = 1; i < path.length; i++){
        const dx = path[i].x - path[i - 1].x;
        const dy = path[i].y - path[i - 1].y;
        cum[i] = cum[i - 1] + Math.hypot(dx, dy);
      }
      return { cum, total: cum[cum.length - 1] };
    }

    function pointAtDistance(path, cum, d){
      if (d <= 0) return path[0];
      const total = cum[cum.length - 1];
      if (d >= total) return path[path.length - 1];

      let i = 1;
      while (i < cum.length && cum[i] < d) i++;

      const d0 = cum[i - 1], d1 = cum[i];
      const t = (d - d0) / (d1 - d0);

      return {
        x: path[i - 1].x + (path[i].x - path[i - 1].x) * t,
        y: path[i - 1].y + (path[i].y - path[i - 1].y) * t
      };
    }

    function drawRouteToKKL(stationKey){
      const route = ROUTES_TO_KKL[stationKey];
      if (!route) return;

      lastRouteStationKey = stationKey;

      clearRoute();
      clearActive();
      popup.style.display = 'none';
      activeAnchorEl = null;

      const ns = "http://www.w3.org/2000/svg";

      const poly = document.createElementNS(ns, "polyline");
      poly.setAttribute("class", "route-line");
      poly.setAttribute("points", route.path.map(p => `${p.x},${p.y}`).join(" "));
      routeLayer.appendChild(poly);

      const start = route.path[0];
      const end = route.path[route.path.length - 1];

      const sDot = document.createElementNS(ns, "circle");
      sDot.setAttribute("class", "route-start-dot");
      sDot.setAttribute("cx", start.x);
      sDot.setAttribute("cy", start.y);
      sDot.setAttribute("r", "1.1");
      routeLayer.appendChild(sDot);

      const eDot = document.createElementNS(ns, "circle");
      eDot.setAttribute("class", "route-end-dot");
      eDot.setAttribute("cx", end.x);
      eDot.setAttribute("cy", end.y);
      eDot.setAttribute("r", "1.2");
      routeLayer.appendChild(eDot);

      // Keep emoji button on map, clickable to replay route
      stationEl = document.createElement('button');
      stationEl.className = 'marker poi';
      stationEl.style.left = `${start.x}%`;
      stationEl.style.top = `${start.y}%`;
      stationEl.innerHTML = '🚉';
      stationEl.style.zIndex = '28';
      stationEl.style.pointerEvents = 'auto';
      stationEl.title = `${route.name} (click to replay route)`;
      stationEl.addEventListener('click', (e) => {
        e.stopPropagation();
        if (lastRouteStationKey) drawRouteToKKL(lastRouteStationKey);
      });
      mapStage.appendChild(stationEl);

      walkerEl = document.createElement('button');
      walkerEl.className = 'marker walker';
      walkerEl.style.left = `${start.x}%`;
      walkerEl.style.top = `${start.y}%`;
      walkerEl.textContent = '🚶';
      walkerEl.title = 'Click to replay route';
      walkerEl.setAttribute('aria-label', 'Replay route');
      walkerEl.addEventListener('click', (e) => {
        e.stopPropagation();
        if (lastRouteStationKey) drawRouteToKKL(lastRouteStationKey);
      });
      mapStage.appendChild(walkerEl);

      // IMPORTANT: no auto zoom in route mode (removed zoomToRoute call)
      showRouteHint(`From ${route.name}: follow the blue line to KKL 📍`);

      const { cum, total } = pathMetrics(route.path);
      const milestoneDistance = (route.milestones || []).map(m => ({
        d: cum[m.index],
        message: m.message,
        shown: false
      }));

      const duration = 12000;
      const startTime = performance.now();

      function frame(now){
        const t = Math.min((now - startTime) / duration, 1);
        const d = total * t;
        const pt = pointAtDistance(route.path, cum, d);

        walkerEl.style.left = `${pt.x}%`;
        walkerEl.style.top = `${pt.y}%`;

        milestoneDistance.forEach(m => {
          if (!m.shown && d >= m.d){
            m.shown = true;
            showRouteHint(m.message);
          }
        });

        if (t < 1){
          routeAnimId = requestAnimationFrame(frame);
        } else {
          showRouteHint("✅ You have arrived at KKL Building.");
          routeAnimId = null;
        }
      }

      routeAnimId = requestAnimationFrame(frame);
    }

    // ---------------------------
    // MODE SWITCH
    // ---------------------------
    function switchMode(mode){
      currentMode = mode;
      clearRoute();

      foodModeBtn.classList.toggle('active', mode === 'food');
      visitModeBtn.classList.toggle('active', mode === 'visit');
      routeModeBtn.classList.toggle('active', mode === 'route');

      mapSection.classList.toggle('route-mode', mode === 'route');
      resetZoomBtn.style.display = (mode === 'route') ? 'none' : 'inline-flex';

      popup.style.display = 'none';
      activeAnchorEl = null;
      clearActive();

      if (mode === 'route'){
        mapTitle.textContent = "HKU Main Campus Map (Route to KKL)";
        mapTitleInline.textContent = "HKU Main Campus Map";
        mapNote.textContent = "Select your MTR station exit to view walking route.";
        mapNoteInline.textContent = "Select your MTR station exit to view walking route.";

        removePoiMarkers();
        list.innerHTML = '';
        listCount.textContent = '0';
        filterBar.innerHTML = '';
        legend.innerHTML = '';

        currentScale = 1;
        currentOrigin = { x:50, y:50 };
        applyZoom();

        stationPrompt.classList.add('show');
        return;
      }

      stationPrompt.classList.remove('show');

      const data = getActiveData();
      listLabel.textContent = data.listLabel;
      mapTitle.textContent = data.title;
      mapTitleInline.textContent = "HKU Main Campus Map";
      mapNote.textContent = data.note;
      mapNoteInline.textContent = data.note;

      removePoiMarkers();
      data.items.forEach(createMarker);

      createList();
      renderFilterBar();
      renderLegend();
      applyFilter();

      currentScale = 1;
      currentOrigin = { x:50, y:50 };
      applyZoom();
    }

    // ---------------------------
    // EVENTS
    // ---------------------------
    foodModeBtn.addEventListener('click', () => switchMode('food'));
    visitModeBtn.addEventListener('click', () => switchMode('visit'));
    routeModeBtn.addEventListener('click', () => switchMode('route'));

    cancelStationPrompt.addEventListener('click', () => {
      stationPrompt.classList.remove('show');
    });

    stationPrompt.querySelectorAll('[data-station]').forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.station;
        stationPrompt.classList.remove('show');
        drawRouteToKKL(key);
      });
    });

    resetZoomBtn.addEventListener('click', () => {
      currentScale = 1;
      currentOrigin = { x:50, y:50 };
      applyZoom();
      popup.style.display = 'none';
      activeAnchorEl = null;
      clearActive();
      clearRoute();
    });

    // Disable zoom in route mode
    mapWrap.addEventListener('wheel', (e) => {
      if (currentMode === 'route') return;

      e.preventDefault();

      const rect = mapStage.getBoundingClientRect();
      const xPct = clamp(((e.clientX - rect.left) / rect.width) * 100, 0, 100);
      const yPct = clamp(((e.clientY - rect.top) / rect.height) * 100, 0, 100);

      const step = 0.18;
      const direction = e.deltaY < 0 ? 1 : -1;
      const nextScale = clamp(currentScale + direction * step, MIN_SCALE, MAX_SCALE);

      currentOrigin = { x:xPct, y:yPct };
      currentScale = nextScale;
      applyZoom();

      if (popup.style.display === 'block' && activeAnchorEl) {
        requestAnimationFrame(() => openPopupNearElement(activeAnchorEl, popup.innerHTML));
      }
    }, { passive:false });

    mapWrap.addEventListener('click', (e) => {
      if (e.target.classList.contains('marker')) return;
      if (popup.contains(e.target)) return;
      popup.style.display = 'none';
      activeAnchorEl = null;
      clearActive();
    });

    document.addEventListener('scroll', () => {
      popup.style.display = 'none';
      activeAnchorEl = null;
    });

    mapStage.addEventListener('transitionend', () => {
      if (popup.style.display === 'block' && activeAnchorEl) {
        openPopupNearElement(activeAnchorEl, popup.innerHTML);
      }
    });

    window.addEventListener('resize', () => {
      if (popup.style.display === 'block' && activeAnchorEl) {
        openPopupNearElement(activeAnchorEl, popup.innerHTML);
      }
    });

    // helper: click map to get coordinate
    document.getElementById('campusMap').addEventListener('click', function(e){
      const rect = this.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(2);
      const y = ((e.clientY - rect.top) / rect.height * 100).toFixed(2);
      console.log(`x:${x}, y:${y}`);
    });

    // init
    createHereMarker();
    switchMode('food');
    applyZoom();
  </script>
