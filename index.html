<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HKU Campus Map</title>
  <style>
    :root{
      --bg:#f6f8fc;
      --card:#ffffff;
      --line:#e5e7eb;
      --text:#0f172a;
      --muted:#64748b;
      --blue:#2563eb;
      --blue2:#1d4ed8;
      --chip:#f1f5f9;
      --map-ratio: 1.6;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .app{
      max-width:1200px;
      margin:0 auto;
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .topbar{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
    }
    .topbar-spacer{ flex:1 1 auto; }
    .btn{
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      border-radius:10px;
      padding:8px 10px;
      font-size:14px;
      cursor:pointer;
    }
    .btn:hover{border-color:#cbd5e1}
    .btn.active{
      background:var(--blue);
      color:#fff;
      border-color:var(--blue2);
    }

    .titlecard{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 12px;
    }
    #mapTitle{margin:0 0 3px 0; font-size:18px}
    #mapNote{margin:0; color:var(--muted); font-size:13px}

    #filterBar{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }
    .chip{
      border:1px solid #dbe2ea;
      background:var(--chip);
      color:#0f172a;
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      cursor:pointer;
    }
    .chip.active{
      background:#dbeafe;
      border-color:#93c5fd;
      color:#1d4ed8;
    }

    .mobile-tabs{
      display:none;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:12px;
      padding:8px;
      gap:8px;
    }
    .mobile-tabs .btn{flex:1}

    .content{
      display:grid;
      grid-template-columns: 1fr 320px;
      gap:10px;
      min-height:560px;
    }

    .map-card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px;
      position:relative;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .map-note-inline{
      color:var(--muted);
      font-size:12px;
      margin:0;
    }

    .route-buttons{
      display:none;
      gap:8px;
      flex-wrap:wrap;
    }
    .route-buttons.show{
      display:flex;
    }
    .route-buttons .btn{
      font-size:13px;
    }

    #campusMapWrap{
      position:relative;
      width:100%;
      aspect-ratio: var(--map-ratio);
      border-radius:10px;
      overflow:hidden;
      background:#e2e8f0;
      touch-action:none;
    }
    #mapStage{
      position:absolute;
      inset:0;
      transform-origin:0 0;
      will-change:transform;
    }
    #mapImage{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      user-select:none;
      -webkit-user-drag:none;
      pointer-events:none;
    }

    #routeLayer{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:none;
      overflow:visible;
      z-index:20;
    }

    .marker{
      position:absolute;
      transform:translate(-50%, -50%);
      width:30px;
      height:30px;
      border:none;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#fff;
      box-shadow:0 2px 8px rgba(15,23,42,.2);
      cursor:pointer;
      font-size:16px;
      z-index:25;
    }
    .marker.poi{background:#fff}
    .marker.walker{background:#fef3c7}
    .marker.here{
      background:#fee2e2;
      z-index:60 !important;
      pointer-events:auto;
    }
    .marker.active{
      outline:2px solid #2563eb;
      transform:translate(-50%, -50%) scale(1.08);
    }

    #popup{
      position:absolute;
      display:none;
      min-width:220px;
      max-width:300px;
      background:#fff;
      border:1px solid #dbe2ea;
      border-radius:10px;
      box-shadow:0 10px 28px rgba(0,0,0,.15);
      padding:10px;
      z-index:70;
      font-size:13px;
      line-height:1.35;
    }
    #popup .row{margin:4px 0}
    .popup-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-bottom:4px;
    }
    .popup-head h4{
      margin:0;
      font-size:14px;
      line-height:1.2;
    }
    .popup-close{
      border:1px solid #d1d5db;
      background:#fff;
      border-radius:8px;
      width:28px;
      height:28px;
      line-height:1;
      font-size:16px;
      cursor:pointer;
      flex:0 0 auto;
    }
    .more-wrap{margin-top:8px}
    .more-btn{
      border:1px solid #bfdbfe;
      background:#eff6ff;
      color:#1d4ed8;
      border-radius:8px;
      padding:6px 9px;
      font-size:12px;
      cursor:pointer;
    }

    #routeHint{
      position:absolute;
      left:10px;
      right:10px;
      top:10px;
      display:none;
      background:#111827d9;
      color:#fff;
      padding:8px 10px;
      border-radius:8px;
      z-index:75;
      font-size:13px;
    }

    .list-card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:12px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height:0;
    }
    .list-head{
      padding:12px;
      border-bottom:1px solid var(--line);
    }
    .list-head h3{
      margin:0;
      font-size:16px;
    }
    .list-head p{
      margin:5px 0 0 0;
      color:var(--muted);
      font-size:12px;
    }
    .list{
      list-style:none;
      margin:0;
      padding:0;
      overflow:auto;
    }
    .list li{border-bottom:1px solid #f1f5f9}
    .list button{
      width:100%;
      border:none;
      background:#fff;
      text-align:left;
      padding:10px 12px;
      cursor:pointer;
    }
    .list button:hover{background:#f8fafc}
    .list button.active{background:#eff6ff}
    .i1{font-size:13px; font-weight:600}
    .i2{font-size:12px; color:#475569; margin-top:2px}
    .i3{font-size:12px; color:#1d4ed8; margin-top:3px}

    .walk-badge{
      display:inline-flex;
      align-items:center;
      gap:4px;
      padding:2px 8px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      line-height:1.2;
      border:1px solid transparent;
      vertical-align:middle;
    }
    .walk-green{
      background:#dcfce7;
      color:#166534;
      border-color:#86efac;
    }
    .walk-amber{
      background:#fef3c7;
      color:#92400e;
      border-color:#fcd34d;
    }
    .walk-red{
      background:#fee2e2;
      color:#991b1b;
      border-color:#fca5a5;
    }

    .drawer-handle{display:none}

    .prompt{
      position:fixed;
      inset:0;
      background:rgba(15,23,42,.45);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:120;
      padding:16px;
    }
    .prompt.show{display:flex}
    .prompt-card{
      background:#fff;
      border-radius:12px;
      border:1px solid var(--line);
      width:min(380px, 100%);
      padding:14px;
    }
    .prompt-card h4{margin:0 0 10px 0}
    .prompt-actions{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-bottom:10px;
    }
    .prompt-actions .btn{text-align:left}
    .prompt-cancel{
      width:100%;
      margin-top:4px;
    }

    @media (max-width: 768px){
      .content{
        display:block;
        min-height:auto;
      }
      .mobile-tabs{
        display:flex;
      }
      .map-card{
        min-height:0;
      }
      .list-card{
        position:fixed;
        left:10px;
        right:10px;
        bottom:10px;
        max-height:58vh;
        transform:translateY(calc(100% - 46px));
        transition:transform .22s ease;
        z-index:85;
      }
      .list-card.open{
        transform:translateY(0);
      }
      .drawer-handle{
        display:block;
        text-align:center;
        font-size:13px;
        color:#475569;
        padding:8px;
        border-bottom:1px solid var(--line);
        cursor:pointer;
        user-select:none;
      }

      #popup.mobile-sheet{
        position:fixed;
        left:10px !important;
        right:10px !important;
        bottom:10px !important;
        top:auto !important;
        max-width:none;
        width:auto;
        max-height:45vh;
        overflow:auto;
        border-radius:12px;
      }

      .route-buttons .btn{
        flex:1 1 100%;
      }

      body.route-mobile .list-card{display:none;}
      body.route-mobile-fs .topbar,
      body.route-mobile-fs .titlecard,
      body.route-mobile-fs .mobile-tabs{
        display:none !important;
      }
      body.route-mobile-fs .app{
        max-width:none;
        padding:0;
      }
      body.route-mobile-fs .content{
        margin:0;
      }
      body.route-mobile-fs .map-card{
        border-radius:0;
        border:none;
        padding:0;
      }
      body.route-mobile-fs #campusMapWrap{
        border-radius: 0;
        width: 100vw;
        height: auto;
        aspect-ratio: var(--map-ratio);
        max-height: 100dvh;
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <button id="foodModeBtn" class="btn active">🍱 Food Map</button>
      <button id="visitModeBtn" class="btn">🏛️ Visit Map</button>
      <button id="routeModeBtn" class="btn">🚶 To KKL</button>
      <button id="resetZoomBtn" class="btn">Reset zoom</button>

      <span class="topbar-spacer"></span>
      <button id="langEnBtn" class="btn active">EN</button>
      <button id="langZhBtn" class="btn">中文</button>
    </div>

    <div class="titlecard">
      <h2 id="mapTitle">HKU Main Campus Map (Food Map)</h2>
      <p id="mapNote">Walking time shown is from KKL Building.</p>

    </div>

    <div class="mobile-tabs">
      <button id="mapTabBtn" class="btn active">🗺️ Map</button>
      <button id="listTabBtn" class="btn">📋 List</button>

    <div class="content">

          </div>
          <div id="routeHint"></div>
          <div id="popup"></div>
        </div>
      </div>

      <aside id="listPanel" class="list-card">
        <div id="drawerHandle" class="drawer-handle">Swipe / tap to open list</div>
        <div class="list-head">
          <h3><span id="listLabel">Restaurant List</span> (<span id="listCount">0</span>)</h3>
          <p id="listSubNote">Walking time shown is from KKL Building.</p>

        <ul id="restaurantList" class="list"></ul>
      </aside>
    </div>
  </div>

    // Pan/zoom state
    let scale = 1;

    let ty = 0;
    const MIN_SCALE = 1;
    const MAX_SCALE_DESKTOP = 2.6;
    const MAX_SCALE_MOBILE = 2.0;

    function isMobile(){ return window.matchMedia('(max-width:768px)').matches; }
    function maxScale(){ return isMobile() ? MAX_SCALE_MOBILE : MAX_SCALE_DESKTOP; }
    function clamp(v,min,max){ return Math.max(min, Math.min(max,v)); }

    function syncMapRatioFromImage(){
      if (!mapImage.naturalWidth || !mapImage.naturalHeight) return;
      const ratio = mapImage.naturalWidth / mapImage.naturalHeight;
      mapWrap.style.setProperty('--map-ratio', ratio);
    }

    function applyTransform(){
      mapStage.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
      if (popup.style.display === 'block' &&
               activeAnchorEl && !isMobile()){
        positionPopup(activeAnchorEl);
      }
    }

    function clampPan(){
      const rect = mapWrap.getBoundingClientRect();
      const w = rect.width, h = rect.height;
      const minTx = w - w * scale;
      const minTy = h - h * scale;
      tx = clamp(tx, minTx, 0);
      ty = clamp(ty, minTy, 0);
    }

    function resetView(){
      scale = 1; tx = 0; ty = 0;
      applyTransform();
    }

    function zoomAt(clientX, clientY, nextScale){
      const rect = mapWrap.getBoundingClientRect();
      const x = clientX - rect.left;
      const y = clientY - rect.top;
      const worldX = (x - tx) / scale;
      const worldY = (y - ty) / scale;

      scale = clamp(nextScale, MIN_SCALE, maxScale());
      tx = x - worldX * scale;
      ty = y - worldY * scale;
      clampPan();
      applyTransform();
    }

    function zoomToPoint(xPct, yPct, targetScale){
      const rect = mapWrap.getBoundingClientRect();
      scale = clamp(targetScale, MIN_SCALE, maxScale());
      const px = (xPct / 100) * rect.width;
      const py = (yPct / 100) * rect.height;
      const targetX = rect.width * 0.5;
      const targetY = rect.height * 0.45;
      tx = targetX - px * scale;
      ty = targetY - py * scale;
      clampPan();
      applyTransform();
    }

    function positionPopup(anchorEl){
      const wrapRect = mapWrap.getBoundingClientRect();
      const aRect = anchorEl.getBoundingClientRect();

      const x = (aRect.left - wrapRect.left) + aRect.width / 2;
      const y = (aRect.top - wrapRect.top) + aRect.height / 2;

      const pad = 8, gap = 10;
      const w = popup.offsetWidth, h = popup.offsetHeight;

      let left = x + gap;
      let top = y - 8;
      if (left + w > wrapRect.width - pad) left = x - w - gap;
      if (left < pad) left = pad;
      if (top < pad) top = pad;
      if (top + h > wrapRect.height - pad) top = wrapRect.height - h - pad;

      popup.style.left = left + 'px';
      popup.style.top = top + 'px';
    }

    function renderFilterBar(){
      const data = getActiveData();
      filterBar.innerHTML = '';
      if (currentMode === 'route') return;

      const allChip = document.createElement('button');
      allChip.className = 'chip active';
      allChip.textContent = t('all');
      allChip.dataset.type = 'all';
      filterBar.appendChild(allChip);

      data.categories.forEach(c => {
        const chip = document.createElement('button');
        chip.className = 'chip';
        chip.textContent = `${c.icon} ${currentLang === 'zh' ? (c.labelZh || c.label) : c.label}`;
        chip.dataset.type = c.key;
        filterBar.appendChild(chip);
      });

      filterBar.querySelectorAll('.chip').forEach(chip => {
        chip.addEventListener('click', () => {
          const ttype = chip.dataset.type;
          if (ttype === 'all'){
            selectedTypes = null;
          } else {
            if (!selectedTypes) selectedTypes = new Set();
            if (selectedTypes.has(ttype)) selectedTypes.delete(ttype); else selectedTypes.add(ttype);
            if (selectedTypes.size === 0) selectedTypes = null;
          }
          paintFilterState();
          applyFilter();
        });
      });

      paintFilterState();
    }

    function paintFilterState(){
      filterBar.querySelectorAll('.chip').forEach(ch => ch.classList.remove('active'));
      const all = filterBar.querySelector('[data-type="all"]');
      if (!selectedTypes || selectedTypes.size === 0){
        all && all.classList.add('active');
      } else {
        selectedTypes.forEach(ttype => {
          const chip = filterBar.querySelector(`[data-type="${ttype}"]`);
          chip && chip.classList.add('active');
        });
      }
    }

    function applyFilter(){
      if (currentMode === 'route') return;
      const data = getActiveData();
      let count = 0;

      data.items.forEach(p => {
        const show = !selectedTypes || selectedTypes.has(p.type);
        const marker = markerById.get(p.id);
        const btn = listBtnById.get(p.id);

        if (marker) marker.style.display = show ? 'flex' : 'none';
        if (btn) btn.closest('li').style.display = show ? '' : 'none';
        if (show) count++;
      });

      listCount.textContent = count;
      popup.style.display = 'none';
      activeAnchorEl = null;
      currentPopupPoint = null;
      popupExpanded = false;
      clearActive();
    }

    // ---------------- ROUTE ----------------
    function showRouteHint(msg){ routeHint.style.display='block'; routeHint.textContent=msg; }
    function hideRouteHint(){ routeHint.style.display='none'; routeHint.textContent=''; }

    function clearRouteStartMarkers(){
      routeStartMarkerByKey.forEach(el => el.remove());
      routeStartMarkerByKey.clear();
    }

    function createRouteStartMarkers(){
      clearRouteStartMarkers();

      Object.entries(ROUTES_TO_KKL).forEach(([stationKey, route]) => {
        const start = route.path[0];
        const m = document.createElement('button');
        m.className = 'marker poi';
        m.style.left = `${start.x}%`;
        m.style.top = `${start.y}%`;
        m.style.zIndex = '28';
        m.innerHTML = '🚉';
        m.title = `${routeName(route)} (tap for route)`;

        m.addEventListener('pointerdown', e => e.stopPropagation());
        m.addEventListener('click', (e) => {
          e.stopPropagation();
          drawRouteToKKL(stationKey);
        });

        mapStage.appendChild(m);
        routeStartMarkerByKey.set(stationKey, m);
      });
    }

    function clearRoute(){
      routeLayer.innerHTML = '';
      if (walkerEl) { walkerEl.remove(); walkerEl = null; }
      if (routeAnimId) { cancelAnimationFrame(routeAnimId); routeAnimId = null; }
      hideRouteHint();
    }

    function pathMetrics(path){
      const cum=[0];
      for(let i=1;i<path.length;i++){
        const dx=path[i].x-path[i-1].x, dy=path[i].y-path[i-1].y;
        cum[i]=cum[i-1]+Math.hypot(dx,dy);
      }
      return {cum,total:cum[cum.length-1]};
    }

    function pointAt(path,cum,d){
      if (d<=0) return path[0];
      const total = cum[cum.length-1];
      if (d >= total) return path[path.length - 1];

      let i=1;
      while(i<cum.length && cum[i]<d) i++;
      const d0=cum[i-1], d1=cum[i];
      const tt=(d-d0)/(d1-d0);

      return {
        x: path[i-1].x + (path[i].x - path[i-1].x) * tt,
        y: path[i-1].y + (path[i].y - path[i-1].y) * tt
      };
    }

    function drawRouteToKKL(stationKey){
      const route = ROUTES_TO_KKL[stationKey];
      if (!route) return;
      lastRouteStationKey = stationKey;

      clearRoute();

      if (routeFsExitTimer){
        clearTimeout(routeFsExitTimer);
        routeFsExitTimer = null;
      }
      if (isMobile() && currentMode === 'route'){
        setRouteFullscreen(true);
      }

      popup.style.display = 'none';
      activeAnchorEl = null;
      currentPopupPoint = null;
      popupExpanded = false;
      clearActive();

      routeStartMarkerByKey.forEach(el => el.classList.remove('active'));
      routeStartMarkerByKey.get(stationKey)?.classList.add('active');

      routeFromSypBtn?.classList.toggle('active', stationKey === 'sypC');
      routeFromHkuBtn?.classList.toggle('active', stationKey === 'hkuA2');

      const ns = "http://www.w3.org/2000/svg";
      const poly = document.createElementNS(ns, "polyline");
      poly.setAttribute("points", route.path.map(p => `${p.x},${p.y}`).join(" "));
      poly.setAttribute("fill", "none");
      poly.setAttribute("stroke", "#2563eb");
      poly.setAttribute("stroke-width", "1.15");
      poly.setAttribute("stroke-linecap", "round");
      poly.setAttribute("stroke-linejoin", "round");
      routeLayer.appendChild(poly);

      const start = route.path[0];
      const end = route.path[route.path.length - 1];

      const startDot = document.createElementNS(ns, "circle");
      startDot.setAttribute("cx", start.x);
      startDot.setAttribute("cy", start.y);
      startDot.setAttribute("r", "1.1");
      startDot.setAttribute("fill", "#0ea5e9");
      routeLayer.appendChild(startDot);

      const endDot = document.createElementNS(ns, "circle");
      endDot.setAttribute("cx", end.x);
      endDot.setAttribute("cy", end.y);
      endDot.setAttribute("r", "1.25");
      endDot.setAttribute("fill", "#dc2626");
      routeLayer.appendChild(endDot);

      walkerEl = document.createElement('button');
      walkerEl.className = 'marker walker';
      walkerEl.style.left = `${start.x}%`;
      walkerEl.style.top = `${start.y}%`;
      walkerEl.style.zIndex = '29';
      walkerEl.textContent = '🚶';
      walkerEl.title = 'Replay route';
      walkerEl.addEventListener('pointerdown', e => e.stopPropagation());
      walkerEl.addEventListener('click', (e) => {
        e.stopPropagation();
        drawRouteToKKL(stationKey);
      });
      mapStage.appendChild(walkerEl);

      showRouteHint(`${t('routeFollowPrefix')} ${routeName(route)}: ${t('routeFollowSuffix')}`);

      const xs = route.path.map(p => p.x);
      const ys = route.path.map(p => p.y);
      const minX = Math.min(...xs), maxX = Math.max(...xs);
      const minY = Math.min(...ys), maxY = Math.max(...ys);
      const centerX = (minX + maxX) / 2;
      const centerY = (minY + maxY) / 2;
      zoomToPoint(centerX, centerY, isMobile() ? 1.25 : 1.45);

      const {cum,total} = pathMetrics(route.path);
      const milestones = (route.milestones || []).map(m => ({
        d: cum[m.index],
        shown: false,
        message: i18nMessage(m.message)
      }));

      const duration = 11000;
      const t0 = performance.now();

      function frame(now){
        const prog = Math.min((now - t0) / duration, 1);
        const d = total * prog;
        const pt = pointAt(route.path, cum, d);

        walkerEl.style.left = `${pt.x}%`;
        walkerEl.style.top = `${pt.y}%`;

        milestones.forEach(m => {
          if (!m.shown && d >= m.d){
            m.shown = true;
            showRouteHint(m.message);
          }
        });

        if (prog < 1){
          routeAnimId = requestAnimationFrame(frame);
        } else {
          routeAnimId = null;
          showRouteHint(t('arrived'));

          if (isMobile() && currentMode === 'route'){
            if (routeFsExitTimer) clearTimeout(routeFsExitTimer);
            routeFsExitTimer = setTimeout(() => {
              setRouteFullscreen(false);
            }, 3000);
          }
        }
      }
      routeAnimId = requestAnimationFrame(frame);
    }

    // ---------------- MOBILE ROUTE FULLSCREEN ----------------
    function setRouteFullscreen(on){
      if (!isMobile()) return;
      document.body.classList.toggle('route-mobile-fs', on);
    }

    function updateMobileRouteUI(){
      const inRouteMobile = isMobile() && currentMode === 'route';
      document.body.classList.toggle('route-mobile', inRouteMobile);

      if (!inRouteMobile){
        setRouteFullscreen(false);
        if (routeFsExitTimer){
          clearTimeout(routeFsExitTimer);
          routeFsExitTimer = null;
        }
      } else {
        listPanel?.classList.remove('open');
        setMobileTab('map');
      }
    }

    // ---------------- LANGUAGE ----------------
    function applyStaticUIText(){
      foodModeBtn.textContent = t('foodBtn');
      visitModeBtn.textContent = t('visitBtn');
      routeModeBtn.textContent = t('routeBtn');
      resetZoomBtn.textContent = t('resetZoom');
      mapTabBtn.textContent = t('mapTab');
      listTabBtn.textContent = t('listTab');
      routeFromSypBtn.textContent = t('routeFromSyp');
      routeFromHkuBtn.textContent = t('routeFromHku');
      drawerHandle.textContent = t('drawerHandle');

      stationPromptTitle.textContent = t('promptTitle');
      stationSypBtn.textContent = t('promptSyp');
      stationHkuBtn.textContent = t('promptHku');
      cancelStationPrompt.textContent = t('cancel');

      langEnBtn.classList.toggle('active', currentLang === 'en');
      langZhBtn.classList.toggle('active', currentLang === 'zh');
    }

    function setLanguage(lang){
      currentLang = lang;
      applyStaticUIText();
      switchMode(currentMode);

      if (currentMode === 'route' && lastRouteStationKey){
        drawRouteToKKL(lastRouteStationKey);
      }

      if (hereMarkerEl){
        hereMarkerEl.title = t('kklBuilding');
      }
    }

    // ---------------- MODE ----------------
    function switchMode(mode){
      currentMode = mode;
      selectedTypes = null;
      clearRoute();
      popup.style.display = 'none';
      activeAnchorEl = null;
      currentPopupPoint = null;
      popupExpanded = false;
      clearActive();

      foodModeBtn.classList.toggle('active', mode==='food');
      visitModeBtn.classList.toggle('active', mode==='visit');
      routeModeBtn.classList.toggle('active', mode==='route');

      if (mode === 'route'){
        mapTitle.textContent = t('routeTitle');
        mapNote.textContent = t('routeNote');
        mapNoteInline.textContent = t('routeNote');

        routeButtons?.classList.add('show');

        removePoiMarkers();
        createRouteStartMarkers();
        list.innerHTML = '';
        listCount.textContent = '0';
        filterBar.innerHTML = '';

        resetView();
        stationPrompt.classList.remove('show');
        showRouteHint(t('routePickHint'));

        if (isMobile()) setMobileTab('map');
        updateMobileRouteUI();
        return;
      }

      routeButtons?.classList.remove('show');
      routeFromSypBtn?.classList.remove('active');
      routeFromHkuBtn?.classList.remove('active');

      clearRouteStartMarkers();
      stationPrompt.classList.remove('show');

      const data = getActiveData();
      mapTitle.textContent = dsText(data, 'title');
      mapNote.textContent = dsText(data, 'note');
      mapNoteInline.textContent = dsText(data, 'note');
      listLabel.textContent = dsText(data, 'listLabel');
      listSubNote.textContent = dsText(data, 'listSubNote') || '';

      removePoiMarkers();
      data.items.forEach(createMarker);
      renderList();
      renderFilterBar();
      applyFilter();
      resetView();

      updateMobileRouteUI();
    }

    // ---------------- MOBILE MAP/LIST TABS ----------------
    function setMobileTab(tab){
      if (!isMobile()) return;
      const showList = tab === 'list';
      listPanel.classList.toggle('open', showList);
      mapTabBtn.classList.toggle('active', !showList);
      listTabBtn.classList.toggle('active', showList);
    }

    mapTabBtn?.addEventListener('click', ()=> setMobileTab('map'));
    listTabBtn?.addEventListener('click', ()=> setMobileTab('list'));

    drawerHandle?.addEventListener('click', ()=>{
      if (!isMobile()) return;
      if (currentMode === 'route') return;
      listPanel.classList.toggle('open');
      const open = listPanel.classList.contains('open');
      mapTabBtn.classList.toggle('active', !open);
      listTabBtn.classList.toggle('active', open);
    });

    // ---------------- EVENTS ----------------
    foodModeBtn.addEventListener('click', ()=>switchMode('food'));
    visitModeBtn.addEventListener('click', ()=>switchMode('visit'));
    routeModeBtn.addEventListener('click', () => {
      switchMode('route');
      stationPrompt.classList.add('show');
    });

    langEnBtn.addEventListener('click', ()=> setLanguage('en'));
    langZhBtn.addEventListener('click', ()=> setLanguage('zh'));

    routeFromSypBtn?.addEventListener('click', () => drawRouteToKKL('sypC'));
    routeFromHkuBtn?.addEventListener('click', () => drawRouteToKKL('hkuA2'));

    cancelStationPrompt.addEventListener('click', ()=> stationPrompt.classList.remove('show'));
    stationPrompt.querySelectorAll('[data-station]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        stationPrompt.classList.remove('show');
        drawRouteToKKL(btn.dataset.station);
      });
    });

    popup.addEventListener('click', (e)=>{
      const closeBtn = e.target.closest('[data-popup-close="1"]');
      if (closeBtn){
        e.stopPropagation();
        popup.style.display = 'none';
        activeAnchorEl = null;
        currentPopupPoint = null;
        popupExpanded = false;
        return;
      }

      const moreBtn = e.target.closest('[data-popup-more="1"]');
      if (!moreBtn) return;
      e.stopPropagation();
      if (!currentPopupPoint) return;
      popupExpanded = true;
      openPopup(activeAnchorEl, popupHTML(currentPopupPoint, true));
    });

    resetZoomBtn.addEventListener('click', ()=>{
      resetView();
      popup.style.display = 'none';
      activeAnchorEl = null;
      currentPopupPoint = null;
      popupExpanded = false;
      clearActive();
    });

    mapWrap.addEventListener('click', (e)=>{
      if (e.target.closest('.marker')) return;
      if (popup.contains(e.target)) return;
      popup.style.display = 'none';
      activeAnchorEl = null;
      currentPopupPoint = null;
      popupExpanded = false;
      clearActive();
    });

    mapWrap.addEventListener('wheel', (e)=>{
      if (currentMode === 'route') return;
      e.preventDefault();
      const delta = e.deltaY < 0 ? 0.14 : -0.14;
      zoomAt(e.clientX, e.clientY, scale + delta);
    }, {passive:false});

    let dragging = false;
    let lastX = 0, lastY = 0;
    let pinchStartDist = 0;
    let pinchStartScale = 1;
    let pinchCenter = null;

    function touchDist(t1,t2){
      const dx=t1.clientX-t2.clientX, dy=t1.clientY-t2.clientY;
      return Math.hypot(dx,dy);
    }
    function touchCenter(t1,t2){
      return {x:(t1.clientX+t2.clientX)/2, y:(t1.clientY+t2.clientY)/2};
    }

    mapWrap.addEventListener('pointerdown', (e)=>{
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      if (e.target.closest('.marker')) return;
      if (popup.contains(e.target)) return;
      if (scale <= 1) return;

      dragging = true;
      lastX = e.clientX; lastY = e.clientY;
      mapWrap.setPointerCapture(e.pointerId);
    });

    mapWrap.addEventListener('pointermove', (e)=>{
      if (!dragging) return;
      tx += (e.clientX - lastX);
      ty += (e.clientY - lastY);
      lastX = e.clientX; lastY = e.clientY;
      clampPan();
      applyTransform();
    });

    mapWrap.addEventListener('pointerup', ()=> dragging=false);
    mapWrap.addEventListener('pointercancel', ()=> dragging=false);

    mapWrap.addEventListener('touchstart', (e)=>{
      if (e.touches.length === 2){
        pinchStartDist = touchDist(e.touches[0], e.touches[1]);
        pinchStartScale = scale;
        pinchCenter = touchCenter(e.touches[0], e.touches[1]);
      }
    }, {passive:true});

    mapWrap.addEventListener('touchmove', (e)=>{
      if (e.touches.length === 2){
        e.preventDefault();
        const d = touchDist(e.touches[0], e.touches[1]);
        const ratio = d / pinchStartDist;
        zoomAt(pinchCenter.x, pinchCenter.y, pinchStartScale * ratio);
      }
    }, {passive:false});

    window.addEventListener('resize', ()=>{
      syncMapRatioFromImage();
      clampPan();
      applyTransform();

      if (!isMobile()){
        listPanel.classList.remove('open');
      }
      if (popup.style.display === 'block' && activeAnchorEl && !isMobile()){
        positionPopup(activeAnchorEl);
      }

      updateMobileRouteUI();
    });

    // ---------------- INIT ----------------
    const mobileTabs = document.querySelector('.mobile-tabs');
    if (isMobile() && mobileTabs && mapWrap && mapWrap.parentNode) {
      mapWrap.parentNode.insertBefore(mobileTabs, mapWrap);
    }

    if (mapImage.complete) syncMapRatioFromImage();
    else mapImage.addEventListener('load', syncMapRatioFromImage);

    createHereMarker();
    setLanguage('en');
    switchMode('food');
    applyTransform();
    if (isMobile()) setMobileTab('map');
    updateMobileRouteUI();
  </script>
</body>
</html>
