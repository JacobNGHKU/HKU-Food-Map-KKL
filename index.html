<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HKU Campus Map</title>
  <style>
    :root{
      --bg:#f4f6fb;
      --card:#ffffff;
      --line:#d9e0ef;
      --text:#1f2a44;
      --blue:#1f4ea3;
    }
    *{box-sizing:border-box}
    body{
      margin:0; padding:24px;
      font-family:Arial, sans-serif;
      background:var(--bg); color:var(--text);
    }
    h1{margin:0 0 16px}
    h2{margin:0 0 12px}
    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:12px;
      padding:16px;
      max-width:1400px;
      margin:auto;
    }

    .top-controls{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .mode-switch{display:flex; gap:8px; flex-wrap:wrap;}
    .mode-btn.active{
      background:var(--blue);
      color:#fff;
      border-color:var(--blue);
    }

    .filter{
      display:flex; flex-wrap:wrap; gap:8px;
      align-items:center; margin-bottom:12px;
    }
    .chip{
      display:inline-flex; align-items:center; gap:6px;
      border:1px solid var(--line); border-radius:20px;
      padding:6px 10px; background:#fff; font-size:14px;
    }

    .layout{
      display:grid;
      grid-template-columns: 1.9fr 1fr;
      gap:14px;
    }
    @media (max-width: 1000px){
      .layout{ grid-template-columns: 1fr; }
    }

    /* MAP */
    .map-wrap{
      position:relative;
      border:1px solid var(--line);
      border-radius:10px;
      overflow:hidden;
      background:#fff;
    }
    .map-stage{
      position:relative;
      width:100%;
      transform-origin:50% 50%;
      transform:scale(1);
      transition:transform .28s ease, transform-origin .18s ease;
      will-change: transform, transform-origin;
    }
    .map-stage img{
      width:100%;
      height:auto;
      display:block;
      user-select:none;
      -webkit-user-drag:none;
    }

    .toolbar{
      position:absolute;
      top:10px; right:10px;
      z-index:40;
      display:flex; gap:8px;
    }
    .btn{
      border:1px solid var(--line);
      background:#fff;
      border-radius:8px;
      padding:6px 10px;
      cursor:pointer;
      font-size:13px;
    }

    .marker{
      position:absolute;
      transform:translate(-50%, -50%);
      width:28px; height:28px;
      border:none; border-radius:50%;
      cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:15px; line-height:1;
      box-shadow:0 2px 8px rgba(0,0,0,.25);
      z-index:20;
    }
    .marker:hover{ transform:translate(-50%, -50%) scale(1.12); }
    .marker.active{
      outline:3px solid #1f4ea355;
      box-shadow:0 0 0 6px #1f4ea322, 0 3px 12px rgba(0,0,0,.28);
      z-index:25;
    }

    .marker.here{
      background:#1f4ea3;
      color:#fff;
      border:2px solid #fff;
      z-index:35;
      cursor:pointer;
      transform:translate(-50%, -62%);
    }
    .marker.here:hover{
      transform:translate(-50%, -62%) scale(1.06);
    }

    /* food colors */
    .canteen{ background:#fff4cc; }
    .cafe{ background:#d9f4ff; }
    .western{ background:#ffe0e0; }
    .asian{ background:#efe2ff; }
    .halal{ background:#e2ffe8; }
    .vegetarian{ background:#e8fff8; }
    .vending{ background:#fff0e6; }

    /* visit colors */
    .historical{ background:#efe6d6; }
    .museum{ background:#e0f7ff; }
    .souvenir{ background:#ffe9f3; }
    .photo{ background:#fff6cc; }

    .popup{
      position:absolute;
      min-width:250px;
      max-width:360px;
      max-height:60vh;
      overflow:auto;
      background:#fff;
      border:1px solid var(--line);
      border-radius:10px;
      padding:10px;
      box-shadow:0 8px 24px rgba(0,0,0,.2);
      display:none;
      z-index:50;
      font-size:13px;
    }
    .popup h4{ margin:0 0 6px; font-size:15px; color:#0d2f6f; }
    .popup p{ margin:4px 0; }

    .walk-time{
      font-weight:700;
      padding:2px 8px;
      border-radius:999px;
      display:inline-block;
    }
    .walk-green{ background:#e8f7ec; color:#1f7a3f; }
    .walk-orange{ background:#fff3e6; color:#b86400; }
    .walk-red{ background:#ffe9e9; color:#b42323; }

    .list-panel{
      border:1px solid var(--line);
      border-radius:10px;
      background:#fff;
      display:flex;
      flex-direction:column;
      min-height:400px;
    }
    .list-header{
      padding:12px;
      border-bottom:1px solid var(--line);
      font-weight:700;
      color:#0d2f6f;
    }
    .list{
      list-style:none; margin:0; padding:0;
      max-height:72vh; overflow:auto;
    }
    .list li{ border-bottom:1px solid #edf1fa; }
    .list button{
      width:100%;
      text-align:left;
      border:none; background:#fff;
      padding:10px 12px;
      cursor:pointer;
    }
    .list button:hover{ background:#f7f9ff; }
    .list button.active{ background:#eaf1ff; }
    .name{ font-weight:700; font-size:14px; }
    .meta{ font-size:12px; color:#56617a; margin-top:2px; }

    .legend{
      margin-top:12px;
      display:flex; flex-wrap:wrap; gap:8px;
    }
    .dot{
      width:18px; height:18px; border-radius:50%;
      display:inline-flex; align-items:center; justify-content:center;
      font-size:12px;
    }
    .note{font-size:12px; color:#5a6785; margin-top:10px;}
  </style>
</head>
<body>
  <h1>HKU Campus Map</h1>

  <section class="panel" id="mapSection">
    <div class="top-controls">
      <h2 id="mapTitle">HKU Main Campus Map (Food Map)</h2>
      <div class="mode-switch">
        <button class="btn mode-btn active" id="foodModeBtn">🍱 Food Map</button>
        <button class="btn mode-btn" id="visitModeBtn">🏛️ Visit Map</button>
      </div>
    </div>

    <div class="filter" id="filterBar"></div>

    <div class="layout">
      <div class="map-wrap" id="campusMapWrap">
        <div class="toolbar">
          <button class="btn" id="resetZoomBtn">Reset zoom</button>
        </div>

        <div class="map-stage" id="mapStage">
          <img id="campusMap"
            src="Main-campus-Faculty-Induction-Talks-2025-scaled.jpg"
            alt="HKU Main Campus Map" />
        </div>

        <div id="popup" class="popup"></div>
      </div>

      <aside class="list-panel">
        <div class="list-header"><span id="listLabel">Restaurant List</span> (<span id="listCount">0</span>)</div>
        <ul class="list" id="restaurantList"></ul>
      </aside>
    </div>

    <div class="legend" id="legend"></div>
    <p class="note" id="mapNote">Walking time shown is from KKL Building.</p>
  </section>

  <script>
    // ---------------------------
    // FOOD DATA
    // ---------------------------
    const restaurants = [
      {id:1,  name:"Chong Yuet Ming Amenities Centre Restaurant & HK Daily", building:"Chong Yuet Ming Cultural Centre", location:"4/F", type:"canteen", icon:"🍱", food:"Local fast food and Chaa Chaan Teng", walkMin:3, x:16.60, y:34.70},
      {id:2,  name:"Café 330", building:"Chong Yuet Ming Amenities Centre", location:"2/F", type:"cafe", icon:"☕", food:"Hot meal, salads, sandwiches and coffee", walkMin:3, x:17.75, y:34.85},
      {id:3,  name:"Vending Hub", building:"Chong Yuet Ming Amenities Centre", location:"G/F", type:"vending", icon:"🥡", food:"Vending service for ready-to-eat box lunches, Chinese rice ball, Japanese rice ball, dessert, snacks, coffee and beverages", walkMin:3, x:17.13, y:35.17},
      {id:4,  name:"Fong Shu Chuen Amenities Centre Restaurant", building:"Fong Shu Chuen Amenities Centre", location:"2/F", type:"asian", icon:"🍜", food:"Local fast food and Asian food", walkMin:3, x:16.20, y:59.95},
      {id:5,  name:"27 Kebab House", building:"Fong Shu Chuen Amenities Centre", location:"1/F", type:"halal", icon:"🕌", food:"Halal food and beverages", walkMin:3, x:16.64, y:60.39},
      {id:6,  name:"SUBWAY", building:"Run Run Shaw Podium", location:"Podium", type:"western", icon:"🥪", food:"Submarine sandwiches and beverages", walkMin:5, x:36.60, y:36.00},
      {id:7,  name:"Kiosk by The Sandwich Club", building:"Run Run Shaw Podium", location:"Podium", type:"western", icon:"🥪", food:"Bento boxes, pastries, sandwiches and salads", walkMin:5, x:37.01, y:36.42},
      {id:8,  name:"The Coffee Academics", building:"Library Building (Old Wing)", location:"G/F", type:"cafe", icon:"☕", food:"Specialty coffee, sandwiches and salads", walkMin:3, x:39.51, y:57.52},
      {id:9,  name:"Union Restaurant", building:"Haking Wong Building", location:"4/F", type:"asian", icon:"🍜", food:"Local fast food and Asian food", walkMin:7, x:59.06, y:45.91},
      {id:10, name:"Vending Nook", building:"Composite Building", location:"G/F", type:"vending", icon:"🥡", food:"24/7 vending service for ready-to-eat Japanese rice ball, dessert, snacks and beverages", walkMin:7, x:67.70, y:47.30},
      {id:11, name:"Starbucks Coffee", building:"Composite Building", location:"G/F", type:"cafe", icon:"☕", food:"Coffee, pastries, sandwiches and salads", walkMin:7, x:68.10, y:48.50},
      {id:12, name:"Tai Tai Foodtopia", building:"Composite Building", location:"G/F", type:"asian", icon:"🍜", food:"Taiwanese beverages, hot meals, noodles, desserts and snacks", walkMin:7, x:68.80, y:47.40},
      {id:13, name:"OORI HANSIK", building:"Composite Building", location:"G/F", type:"asian", icon:"🍜", food:"Korean food, hot meals, fried chicken, snacks and coffee", walkMin:7, x:68.29, y:47.91},
      {id:14, name:"Oliver’s Super Sandwiches", building:"The Jockey Club Tower, Centennial Campus", location:"LG/F", type:"western", icon:"🥪", food:"Sandwiches, baked potato, pasta, salad and coffee", walkMin:10, x:82.55, y:49.95},
      {id:15, name:"alfafa café", building:"The Jockey Club Tower, Centennial Campus", location:"G/F", type:"cafe", icon:"☕", food:"Pasta, sandwiches, salads, pastries and specialty coffee", walkMin:10, x:83.01, y:50.40},
      {id:16, name:"Gourmet Asia", building:"Run Run Shaw Tower, Centennial Campus", location:"G/F", type:"asian", icon:"🍜", food:"Southeast Asia cuisine", walkMin:13, x:81.20, y:60.60},
      {id:17, name:"BIJAS Vegetarian", building:"Run Run Shaw Tower, Centennial Campus", location:"G/F", type:"vegetarian", icon:"🥗", food:"Vegetarian food (Chinese cuisine)", walkMin:13, x:81.68, y:61.01},
      {id:18, name:"The Good Bridge (Staff Only)", building:"Jockey Club Tower, Centennial Campus", location:"4/F", type:"western", icon:"🍽️", food:"Western food and Chinese food", walkMin:10, x:83.01, y:50.40, access:"Staff Only"},
      {id:19, name:"Senior Common Room (SCR Club Members Only)", building:"KKL Building", location:"14-15/F", type:"western", icon:"🍽️", food:"Western food and Chinese food", walkMin:1, x:24.04, y:53.71, access:"SCR Club Members Only"}
    ];

    // ---------------------------
    // VISIT DATA
    // ---------------------------
    const visitPoints = [
      // Historical
      {id:1, name:"Main Building, The University of Hong Kong", type:"historical", icon:"🏛️", walkMin:3, x:37.76, y:69.13, info:"The oldest structure on HKU Main Campus. Construction began in 1910 and completed in 1912. Exterior declared a monument in 1984."},
      {id:2, name:"Hung Hing Ying Building, The University of Hong Kong", type:"historical", icon:"🏛️", walkMin:5, x:37.16, y:80.56, info:"Opened in 1919, originally designed as the Union Building. Exterior declared a monument in 1995."},
      {id:3, name:"Fung Ping Shan Building, The University of Hong Kong", type:"historical", icon:"🏛️", walkMin:5, x:19.40, y:69.13, info:"Completed in 1932 as a Chinese library and later became part of the University Museum and Art Gallery. Exterior declared a monument in 2018."},
      {id:4, name:"Tang Chi Ngong Building, The University of Hong Kong", type:"historical", icon:"🏛️", walkMin:5, x:9.14, y:61.33, info:"Officially opened in 1931 for the School of Chinese. Exterior declared a monument in 1995."},
      {id:5, name:"Eliot Hall, The University of Hong Kong", type:"historical", icon:"🏛️", walkMin:10, x:9.98, y:33.39, info:"Opened in 1914 as a purpose-built student residential hall. Exterior declared a monument in 2018."},
      {id:6, name:"May Hall, The University of Hong Kong", type:"historical", icon:"🏛️", walkMin:10, x:5.88, y:25.04, info:"Opened in 1915 as a student hall and part of HKU’s Old Halls heritage. Exterior declared a monument in 2018."},
      {id:7, name:"Bungalow and Workmen’s Quarters, West Point Filters", type:"historical", icon:"🏛️", walkMin:15, x:26.17, y:10.71, info:"Remaining structures of historic West Point Filters (Pokfulam Filter Beds). Graded historic buildings."},
      {id:8, name:"Senior Staff Quarters, Elliot Pumping Station and Filters", type:"historical", icon:"🏛️", walkMin:15, x:78.22, y:67.68, info:"Built in 1925 for site managers. Now known as Run Run Shaw Heritage House. Grade 2 historic building."},
      {id:9, name:"Workmen's Quarters, Elliot Pumping Station and Filters", type:"historical", icon:"🏛️", walkMin:15, x:85.83, y:68.95, info:"Built between 1918 and 1919 as quarters for Chinese staff. Now HKU Visitor Centre. Grade 3 historic building."},
      {id:10, name:"Treatment Works Building, Elliot Pumping Station and Filters", type:"historical", icon:"🏛️", walkMin:15, x:90.90, y:41.55, info:"Built between 1930 and 1931 as a filtration plant. Grade 3 historic building."},

      // Art Gallery / Museum
      {id:11, name:"University Museum & Art Gallery", type:"museum", icon:"🖼️", walkMin:5, building:"Fung Ping Shan Building", location:"1-2/F", hours:"Tuesday–Saturday 9:30am–6:00pm; Sunday 1:00pm–6:00pm; Closed on Mondays, Public and University Holidays.", x:17.36, y:70.22},
      {id:12, name:"Stephen Hui Geological Museum", type:"museum", icon:"🖼️", walkMin:5, building:"James Lee Science Building", location:"G-1/F", hours:"Mondays to Fridays from 1:00pm to 6:00pm. Closed on Saturdays, Sundays, Public and University Holidays (March 16, December 24, 31 and Chinese New Year Eve). Weekday mornings are reserved for guided group tours.", info:"We welcome individual visitors to walk in during opening hours, free of charge.", x:47.54, y:37.88},
      {id:13, name:"Jao Tsung-I Petite Ecole", type:"museum", icon:"🖼️", walkMin:3, building:"Tang Chi Ngong Building", hours:"10:00am – 5:00pm Monday to Friday (Closed on Saturdays, Sundays & University/Public Holidays)", x:12.04, y:61.00},
      {id:14, name:"Hong Kong Biodiversity Museum", type:"museum", icon:"🖼️", walkMin:5, building:"Kadoorie Biological Sciences Building", location:"2/F", hours:"Wed, Sat, Sun (45 min session)", bookingUrl:"https://www.hkbiodiversitymuseum.org/booking-calendar/%E5%8D%9A%E9%81%8A%E7%94%9F%E7%89%A9-biodiversity-journey", x:47.38, y:55.57},

      // Souvenir / Book shop
      {id:15, name:"Visitor Centre (Souvenir Shop)", type:"souvenir", icon:"🛍️", walkMin:13, hours:"9:30AM – 5:00PM (Mon – Sat); 11:00AM – 5:00PM (Sun); Closed on University and Public Holidays", x:83.70, y:68.93},
      {id:16, name:"HKUP Bookshop", type:"souvenir", icon:"🛍️", walkMin:13, building:"Run Run Shaw Heritage House", location:"G/F", hours:"Monday to Friday 10:00am to 5:00pm (closes on Public and University holidays)", x:80.57, y:67.75},

      // Popular photo points
      {id:17, name:"Red Brick Wall", type:"photo", icon:"📸", walkMin:10, x:88.67, y:62.53},
      {id:18, name:"Main Building", type:"photo", icon:"📸", walkMin:5, x:37.65, y:74.02},
      {id:19, name:"Lily Pond", type:"photo", icon:"📸", walkMin:5, x:30.21, y:44.61},
      {id:20, name:"May Hall and Elliot Hall", type:"photo", icon:"📸", walkMin:13, x:6.11, y:31.36}
    ];

    const DATASETS = {
      food: {
        title: "HKU Main Campus Map (Food Map)",
        listLabel: "Restaurant List",
        note: "Walking time shown is from KKL Building.",
        items: restaurants,
        categories: [
          {key:"canteen", label:"Canteen", icon:"🍱", className:"canteen"},
          {key:"cafe", label:"Cafe", icon:"☕", className:"cafe"},
          {key:"western", label:"Western", icon:"🥪", className:"western"},
          {key:"asian", label:"Asian", icon:"🍜", className:"asian"},
          {key:"halal", label:"Halal", icon:"🕌", className:"halal"},
          {key:"vegetarian", label:"Vegetarian", icon:"🥗", className:"vegetarian"},
          {key:"vending", label:"Vending", icon:"🥡", className:"vending"}
        ]
      },
      visit: {
        title: "HKU Main Campus Map (Visit Map)",
        listLabel: "Visiting Points",
        note: "Explore campus heritage, museums, shops, and photo spots.",
        items: visitPoints,
        categories: [
          {key:"historical", label:"Historical Buildings", icon:"🏛️", className:"historical"},
          {key:"museum", label:"Art Gallery / Museum", icon:"🖼️", className:"museum"},
          {key:"souvenir", label:"Souvenir Shop / Book Shop", icon:"🛍️", className:"souvenir"},
          {key:"photo", label:"Popular Photo Taking Spot", icon:"📸", className:"photo"}
        ]
      }
    };

    // Fixed "I'm here" location (KKL)
    const HERE = { x:24.04, y:56.28, yOffset:-1.2 };

    const mapSection = document.getElementById('mapSection');
    const mapStage = document.getElementById('mapStage');
    const mapWrap = document.getElementById('campusMapWrap');
    const popup = document.getElementById('popup');
    const list = document.getElementById('restaurantList');
    const listCount = document.getElementById('listCount');
    const listLabel = document.getElementById('listLabel');
    const mapTitle = document.getElementById('mapTitle');
    const mapNote = document.getElementById('mapNote');
    const filterBar = document.getElementById('filterBar');
    const legend = document.getElementById('legend');
    const foodModeBtn = document.getElementById('foodModeBtn');
    const visitModeBtn = document.getElementById('visitModeBtn');

    const markerById = new Map();
    const listBtnById = new Map();

    let currentMode = 'food';
    let hereMarkerEl = null;
    let activeAnchorEl = null;
    let currentScale = 1;
    let currentOrigin = { x:50, y:50 };
    const MIN_SCALE = 1;
    const MAX_SCALE = 3;

    function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }

    function applyZoom(){
      mapStage.style.transformOrigin = `${currentOrigin.x}% ${currentOrigin.y}%`;
      mapStage.style.transform = `scale(${currentScale})`;
    }

    function zoomToPoint(xPercent, yPercent, scale=1.8){
      currentOrigin.x = clamp(xPercent, 0, 100);
      currentOrigin.y = clamp(yPercent, 0, 100);
      currentScale = clamp(scale, MIN_SCALE, MAX_SCALE);
      applyZoom();
    }

    function walkColorClass(min){
      if (min <= 5) return 'walk-green';
      if (min <= 10) return 'walk-orange';
      return 'walk-red';
    }

    function walkTimeHTML(min){
      return `<span class="walk-time ${walkColorClass(min)}">🚶 ${min} min</span>`;
    }

    function categoryLabel(type){
      const data = getActiveData();
      const c = data.categories.find(x => x.key === type);
      return c ? c.label : type;
    }

    function clearActive(){
      document.querySelectorAll('.marker.active').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.list button.active').forEach(el => el.classList.remove('active'));
    }

    function openPopupNearElement(anchorEl, html){
      if (!anchorEl) return;
      popup.innerHTML = html;
      popup.style.display = 'block';

      const wrapRect = mapWrap.getBoundingClientRect();
      const aRect = anchorEl.getBoundingClientRect();

      const x = (aRect.left - wrapRect.left) + (aRect.width / 2);
      const y = (aRect.top - wrapRect.top) + (aRect.height / 2);

      const pad = 8;
      const gap = 12;
      const popupW = popup.offsetWidth;
      const popupH = popup.offsetHeight;

      let left = x + gap;
      let top = y - 10;

      if (left + popupW > wrapRect.width - pad) left = x - popupW - gap;
      if (left < pad) left = pad;
      if (left + popupW > wrapRect.width - pad) left = wrapRect.width - popupW - pad;

      if (top < pad) top = pad;
      if (top + popupH > wrapRect.height - pad) top = wrapRect.height - popupH - pad;

      popup.style.left = `${left}px`;
      popup.style.top = `${top}px`;

      activeAnchorEl = anchorEl;
    }

    function getActiveData(){
      return DATASETS[currentMode];
    }

    function pointPopupHTML(p){
      if (currentMode === 'food') {
        return `
          <h4>${p.id}. ${p.name}</h4>
          <p><strong>Building:</strong> ${p.building}</p>
          <p><strong>Location:</strong> ${p.location}</p>
          <p><strong>Type:</strong> ${p.type}</p>
          <p><strong>Food:</strong> ${p.food}</p>
          ${p.access ? `<p><strong>Access:</strong> ${p.access}</p>` : ''}
          <p><strong>Walk from KKL:</strong> ${walkTimeHTML(p.walkMin)}</p>
        `;
      }

      return `
        <h4>${p.id}. ${p.name}</h4>
        <p><strong>Category:</strong> ${categoryLabel(p.type)}</p>
        ${p.building ? `<p><strong>Building:</strong> ${p.building}</p>` : ''}
        ${p.location ? `<p><strong>Location:</strong> ${p.location}</p>` : ''}
        ${p.walkMin ? `<p><strong>Walk from KKL:</strong> ${walkTimeHTML(p.walkMin)}</p>` : ''}
        ${p.hours ? `<p><strong>Opening Hours:</strong> ${p.hours}</p>` : ''}
        ${p.bookingUrl ? `<p><strong>Book:</strong> <a href="${p.bookingUrl}" target="_blank" rel="noopener noreferrer">Visit booking page</a></p>` : ''}
        ${p.info ? `<p>${p.info}</p>` : ''}
      `;
    }

    function focusPoint(p){
      clearActive();
      const marker = markerById.get(p.id);
      const listBtn = listBtnById.get(p.id);
      if (marker) marker.classList.add('active');
      if (listBtn) listBtn.classList.add('active');

      mapSection.scrollIntoView({ behavior:'smooth', block:'start' });
      zoomToPoint(p.x, p.y, 1.8);

      setTimeout(() => openPopupNearElement(marker, pointPopupHTML(p)), 180);
    }

    function removePoiMarkers(){
      document.querySelectorAll('.marker.poi').forEach(el => el.remove());
      markerById.clear();
    }

    function createMarker(p){
      const btn = document.createElement('button');
      btn.className = `marker poi ${p.type}`;
      btn.style.left = p.x + '%';
      btn.style.top = p.y + '%';
      btn.innerHTML = p.icon;
      btn.dataset.type = p.type;
      btn.dataset.id = p.id;
      btn.title = p.name;
      btn.setAttribute('aria-label', p.name);

      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        focusPoint(p);
      });

      markerById.set(p.id, btn);
      mapStage.appendChild(btn);
    }

    function createHereMarker(){
      if (hereMarkerEl) return;
      const here = document.createElement('button');
      here.className = 'marker here';
      here.style.left = `${HERE.x}%`;
      here.style.top = `${HERE.y + HERE.yOffset}%`;
      here.innerHTML = '📍';
      here.title = "I'm here (KKL Building)";
      here.setAttribute('aria-label', "I'm here (KKL Building)");

      here.addEventListener('click', (e) => {
        e.stopPropagation();
        clearActive();
        mapSection.scrollIntoView({ behavior:'smooth', block:'start' });
        zoomToPoint(HERE.x, HERE.y, 2.0);

        setTimeout(() => {
          openPopupNearElement(here, `
            <h4>📍 You are at KKL Building</h4>
            <p>Use the map or list to explore nearby points.</p>
          `);
        }, 180);
      });

      hereMarkerEl = here;
      mapStage.appendChild(here);
    }

    function createList(){
      list.innerHTML = '';
      listBtnById.clear();

      const data = getActiveData();

      data.items.forEach(p => {
        const li = document.createElement('li');
        const btn = document.createElement('button');
        btn.dataset.type = p.type;
        btn.dataset.id = p.id;

        if (currentMode === 'food') {
          btn.innerHTML = `
            <div class="name">${p.icon} ${p.id}. ${p.name}</div>
            <div class="meta">${p.location}, ${p.building}</div>
            <div class="meta">${p.food}</div>
            ${p.access ? `<div class="meta"><strong>Access:</strong> ${p.access}</div>` : ''}
            <div class="meta">${walkTimeHTML(p.walkMin)} walk from KKL</div>
          `;
        } else {
          btn.innerHTML = `
            <div class="name">${p.icon} ${p.id}. ${p.name}</div>
            <div class="meta">${categoryLabel(p.type)}</div>
            ${p.building ? `<div class="meta">${p.location ? `${p.location}, ` : ''}${p.building}</div>` : ''}
            ${p.walkMin ? `<div class="meta">${walkTimeHTML(p.walkMin)} walk from KKL</div>` : ''}
            ${p.hours ? `<div class="meta">${p.hours}</div>` : ''}
            ${p.bookingUrl ? `<div class="meta"><a href="${p.bookingUrl}" target="_blank" rel="noopener noreferrer">Booking link</a></div>` : ''}
            ${p.info ? `<div class="meta">${p.info}</div>` : ''}
          `;
        }

        btn.addEventListener('click', () => focusPoint(p));
        li.appendChild(btn);
        list.appendChild(li);
        listBtnById.set(p.id, btn);
      });
    }

    function renderFilterBar(){
      const data = getActiveData();
      filterBar.innerHTML = `<strong>Filter:</strong>`;

      const all = document.createElement('label');
      all.className = 'chip';
      all.innerHTML = `<input type="checkbox" value="all" checked> All`;
      filterBar.appendChild(all);

      data.categories.forEach(cat => {
        const label = document.createElement('label');
        label.className = 'chip';
        label.innerHTML = `<input type="checkbox" value="${cat.key}" checked> ${cat.label}`;
        filterBar.appendChild(label);
      });

      const checks = filterBar.querySelectorAll('input[type="checkbox"]');
      const allBox = filterBar.querySelector('input[value="all"]');

      checks.forEach(c => {
        c.addEventListener('change', (e) => {
          if (e.target.value === 'all') {
            checks.forEach(x => x.checked = e.target.checked);
          } else {
            const nonAll = [...checks].filter(x => x.value !== 'all');
            allBox.checked = nonAll.every(x => x.checked);
          }
          applyFilter();
        });
      });
    }

    function renderLegend(){
      const data = getActiveData();
      legend.innerHTML = '';

      data.categories.forEach(cat => {
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.innerHTML = `<span class="dot ${cat.className}">${cat.icon}</span> ${cat.label}`;
        legend.appendChild(chip);
      });

      if (currentMode === 'food') {
        const extra = document.createElement('span');
        extra.className = 'chip';
        extra.innerHTML = `<span class="dot" style="background:#f0ecff;">🍽️</span> Staff/Members only (Chinese + Western)`;
        legend.appendChild(extra);
      }

      const here = document.createElement('span');
      here.className = 'chip';
      here.innerHTML = `<span class="dot" style="background:#1f4ea3;color:#fff;">📍</span> I’m here (KKL)`;
      legend.appendChild(here);
    }

    function selectedTypes(){
      const checks = filterBar.querySelectorAll('input[type="checkbox"]');
      const allBox = filterBar.querySelector('input[value="all"]');
      const allChecked = allBox ? allBox.checked : true;
      const chosen = [...checks]
        .filter(c => c.checked && c.value !== 'all')
        .map(c => c.value);
      return { allChecked, chosen };
    }

    function applyFilter(){
      const data = getActiveData();
      const { allChecked, chosen } = selectedTypes();
      let visibleCount = 0;

      data.items.forEach(p => {
        const show = allChecked || chosen.includes(p.type);
        const marker = markerById.get(p.id);
        const liBtn = listBtnById.get(p.id);

        if (marker) marker.style.display = show ? 'flex' : 'none';
        if (liBtn) liBtn.closest('li').style.display = show ? 'block' : 'none';
        if (show) visibleCount++;
      });

      listCount.textContent = visibleCount;
      popup.style.display = 'none';
      activeAnchorEl = null;
      clearActive();
    }

    function switchMode(mode){
      currentMode = mode;
      foodModeBtn.classList.toggle('active', mode === 'food');
      visitModeBtn.classList.toggle('active', mode === 'visit');

      const data = getActiveData();
      mapTitle.textContent = data.title;
      listLabel.textContent = data.listLabel;
      mapNote.textContent = data.note;

      removePoiMarkers();
      data.items.forEach(createMarker);

      createList();
      renderFilterBar();
      renderLegend();
      applyFilter();

      currentScale = 1;
      currentOrigin = {x:50, y:50};
      applyZoom();
    }

    foodModeBtn.addEventListener('click', () => switchMode('food'));
    visitModeBtn.addEventListener('click', () => switchMode('visit'));

    document.getElementById('resetZoomBtn').addEventListener('click', () => {
      currentScale = 1;
      currentOrigin = {x:50, y:50};
      applyZoom();
      popup.style.display = 'none';
      activeAnchorEl = null;
      clearActive();
    });

    mapWrap.addEventListener('wheel', (e) => {
      e.preventDefault();

      const rect = mapStage.getBoundingClientRect();
      const xPct = clamp(((e.clientX - rect.left) / rect.width) * 100, 0, 100);
      const yPct = clamp(((e.clientY - rect.top) / rect.height) * 100, 0, 100);

      const step = 0.18;
      const direction = e.deltaY < 0 ? 1 : -1;
      const nextScale = clamp(currentScale + direction * step, MIN_SCALE, MAX_SCALE);

      currentOrigin = { x:xPct, y:yPct };
      currentScale = nextScale;
      applyZoom();

      if (popup.style.display === 'block' && activeAnchorEl) {
        requestAnimationFrame(() => openPopupNearElement(activeAnchorEl, popup.innerHTML));
      }
    }, { passive:false });

    mapWrap.addEventListener('click', (e) => {
      if (e.target.classList.contains('marker')) return;
      if (popup.contains(e.target)) return;
      popup.style.display = 'none';
      activeAnchorEl = null;
      clearActive();
    });

    document.addEventListener('scroll', () => {
      popup.style.display = 'none';
      activeAnchorEl = null;
    });

    mapStage.addEventListener('transitionend', () => {
      if (popup.style.display === 'block' && activeAnchorEl) {
        openPopupNearElement(activeAnchorEl, popup.innerHTML);
      }
    });

    window.addEventListener('resize', () => {
      if (popup.style.display === 'block' && activeAnchorEl) {
        openPopupNearElement(activeAnchorEl, popup.innerHTML);
      }
    });

    document.getElementById('campusMap').addEventListener('click', function(e){
      const rect = this.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(2);
      const y = ((e.clientY - rect.top) / rect.height * 100).toFixed(2);
      console.log(`x:${x}, y:${y}`);
    });

    // init
    createHereMarker();
    switchMode('food');
    applyZoom();
  </script>
</body>
</html>
