<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HKU Campus Map</title>
  <style>
    :root{
      --bg:#f6f8fb;
      --card:#ffffff;
      --ink:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --blue:#2563eb;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      background:var(--bg);
      color:var(--ink);
    }

    .app{
      max-width:1200px;
      margin:0 auto;
      padding:12px;
    }

    .topbar{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      margin-bottom:10px;
    }
    .btn{
      border:1px solid var(--line);
      background:#fff;
      border-radius:10px;
      padding:8px 12px;
      cursor:pointer;
      font-weight:600;
    }
    .btn.active{
      border-color:#bfdbfe;
      background:#eff6ff;
      color:#1d4ed8;
    }

    .meta{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 12px;
      margin-bottom:10px;
    }
    .meta h2{
      margin:0 0 4px;
      font-size:18px;
    }
    .meta p{
      margin:0;
      color:var(--muted);
      font-size:14px;
    }

    .filterbar,.legend{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }
    .chip{
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      padding:6px 10px;
      font-size:13px;
      cursor:pointer;
    }
    .chip.active{
      background:#eff6ff;
      border-color:#bfdbfe;
      color:#1d4ed8;
    }

    .layout{
      display:grid;
      grid-template-columns:1fr 340px;
      gap:12px;
      align-items:start;
    }

    .map-card{
      position:relative;
      background:#fff;
      border:1px solid var(--line);
      border-radius:12px;
      overflow:hidden;
    }

    .mobile-tabs{
      display:none;
      gap:8px;
      padding:10px 10px 0;
      background:#fff;
      border:1px solid var(--line);
      border-radius:12px;
      margin-bottom:8px;
    }

    #campusMapWrap{
      --map-ratio:1.45;
      position:relative;
      width:100%;
      aspect-ratio:var(--map-ratio);
      overflow:hidden;
      touch-action:none;
      background:#eef2ff;
      border-top:1px solid var(--line);
    }

    #mapStage{
      position:absolute;
      inset:0;
      transform-origin:top left;
      will-change:transform;
    }

    #mapImage{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:contain;
      user-select:none;
      -webkit-user-drag:none;
      pointer-events:none;
    }

    #routeLayer{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:none;
      overflow:visible;
    }

    .marker{
      position:absolute;
      transform:translate(-50%,-50%);
      width:30px;
      height:30px;
      border:1px solid rgba(15,23,42,.12);
      border-radius:999px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:16px;
      cursor:pointer;
      box-shadow:0 2px 8px rgba(2,6,23,.15);
      z-index:25;
    }
    .marker.active{
      outline:2px solid #60a5fa;
      transform:translate(-50%,-50%) scale(1.08);
    }
    .marker.walker{
      background:#dcfce7;
      border-color:#86efac;
    }

    /* FIX 1: Always keep "I'm here" on top */
    .marker.here{
      z-index:60 !important;
      background:#fef9c3;
      border-color:#fde68a;
    }

    #popup{
      position:absolute;
      display:none;
      background:#fff;
      border:1px solid var(--line);
      border-radius:12px;
      box-shadow:0 10px 24px rgba(2,6,23,.2);
      padding:10px 12px;
      max-width:min(92vw,360px);
      z-index:70;
    }
    #popup h4{
      margin:0 0 4px;
      font-size:14px;
      line-height:1.35;
    }
    #popup .row{
      margin-top:4px;
      font-size:13px;
      color:#1e293b;
    }

    .more-wrap{margin-top:8px}
    .more-btn{
      border:1px solid #bfdbfe;
      background:#eff6ff;
      color:#1d4ed8;
      border-radius:8px;
      padding:5px 10px;
      font-size:12px;
      font-weight:700;
      cursor:pointer;
    }

    #routeHint{
      position:absolute;
      left:10px;
      bottom:10px;
      z-index:71;
      display:none;
      background:rgba(15,23,42,.88);
      color:#fff;
      border-radius:10px;
      padding:7px 10px;
      font-size:12px;
      max-width:min(86vw,360px);
    }

    .list-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:12px;
      overflow:hidden;
    }
    .list-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom:1px solid var(--line);
      padding:10px 12px;
      font-weight:700;
    }
    .list{
      list-style:none;
      margin:0;
      padding:0;
      max-height:65vh;
      overflow:auto;
    }
    .list li{border-bottom:1px solid #f1f5f9}
    .list button{
      width:100%;
      text-align:left;
      border:0;
      background:#fff;
      padding:10px 12px;
      cursor:pointer;
    }
    .list button:hover{background:#f8fafc}
    .list button.active{background:#eff6ff}
    .i1{font-weight:700;font-size:14px}
    .i2,.i3{font-size:12px;color:var(--muted);margin-top:2px}

    #stationPrompt{
      position:fixed;
      inset:0;
      background:rgba(2,6,23,.45);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:120;
      padding:16px;
    }
    #stationPrompt.show{display:flex}
    .prompt-box{
      width:min(92vw,420px);
      background:#fff;
      border-radius:12px;
      border:1px solid var(--line);
      padding:14px;
    }
    .prompt-title{font-size:16px;font-weight:800;margin-bottom:10px}
    .prompt-actions{display:grid;gap:8px}
    .prompt-actions .btn{text-align:left}
    .prompt-foot{margin-top:10px;text-align:right}

    @media (max-width:768px){
      .layout{
        grid-template-columns:1fr;
      }

      .mobile-tabs{
        display:flex;
      }

      .list-card{
        position:fixed;
        left:0;
        right:0;
        bottom:0;
        z-index:80;
        border-radius:14px 14px 0 0;
        transform:translateY(calc(100% - 44px));
        transition:transform .25s ease;
        max-height:72vh;
      }
      .list-card.open{
        transform:translateY(0);
      }
      .list-head{
        cursor:pointer;
      }

      /* FIX 2: compact mobile details */
      #popup.mobile-sheet{
        left:8px !important;
        right:8px !important;
        top:auto !important;
        bottom:8px !important;
        width:auto;
        max-width:none;
        max-height:34dvh;
        overflow:auto;
        border-radius:12px;
        padding:10px 12px;
        font-size:13px;
        line-height:1.35;
      }

      body.route-mobile-fs .topbar,
      body.route-mobile-fs .meta,
      body.route-mobile-fs .mobile-tabs,
      body.route-mobile-fs .list-card{
        display:none !important;
      }
      body.route-mobile-fs .app{
        padding:0;
        max-width:none;
      }
      body.route-mobile-fs .map-card{
        border-radius:0;
        border:0;
      }
      body.route-mobile-fs #campusMapWrap{
        height:100dvh;
        aspect-ratio:auto;
        border:0;
      }
    }
  </style>
</head>

    function syncMapRatioFromImage(){
      if (!mapImage.naturalWidth || !mapImage.naturalHeight) return;
      const ratio = mapImage.naturalWidth / mapImage.naturalHeight;
      mapWrap.style.setProperty('--map-ratio', ratio);
    }

    function applyTransform(){
      mapStage.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;

    function clampPan(){
      const rect = mapWrap.getBoundingClientRect();
      const w = rect.width, h = rect.height;
      const minTx = w - w * scale;
      const minTy = h - h * scale;
      tx = clamp(tx, minTx, 0);
      ty = clamp(ty, minTy, 0);
    }

    function resetView(){
      scale = 1; tx = 0; ty = 0;
      applyTransform();
    }

    function zoomAt(clientX, clientY, nextScale){
      const rect = mapWrap.getBoundingClientRect();
      const x = clientX - rect.left;
      const y = clientY - rect.top;
      const worldX = (x - tx) / scale;
      const worldY = (y - ty) / scale;

      scale = clamp(nextScale, MIN_SCALE, maxScale());
      tx = x - worldX * scale;
      ty = y - worldY * scale;
      clampPan();
      applyTransform();
    }

    function zoomToPoint(xPct, yPct, targetScale){
      const rect = mapWrap.getBoundingClientRect();
      scale = clamp(targetScale, MIN_SCALE, maxScale());

      const px = (xPct / 100) * rect.width;
      const py = (yPct / 100) * rect.height;
      const targetX = rect.width * 0.5;
      const targetY = rect.height * 0.45;

      tx = targetX - px * scale;
      ty = targetY - py * scale;
      clampPan();
      applyTransform();
    }

    function walkTimeHTML(min){ return `🚶 ${min} min`; }
    function getActiveData(){ return currentMode === 'visit' ? DATASETS.visit : DATASETS.food; }

    function catLabel(type){
      const c = getActiveData().categories.find(x => x.key === type);
      return c ? c.label : type;
    }

    function clearActive(){
      document.querySelectorAll('.marker.active').forEach(el=>el.classList.remove('active'));
      document.querySelectorAll('.list button.active').forEach(el=>el.classList.remove('active'));
    }

    function popupMoreBtnHTML(expanded){
      if (!isMobile()) return '';
      if (expanded) return '';
      return `<div class="more-wrap"><button class="more-btn" data-popup-more="1">More</button></div>`;
    }

    function popupHTML(p, expanded){
      if (currentMode === 'food'){
        const rows = [
          `<div class="row"><b>Building:</b> ${p.building}</div>`,
          `<div class="row"><b>Location:</b> ${p.location}</div>`,
          `<div class="row"><b>Type:</b> ${catLabel(p.type)}</div>`,
          `<div class="row"><b>Walk from KKL:</b> ${walkTimeHTML(p.walkMin)}</div>`
        ];
        if (expanded){
          rows.splice(3, 0, `<div class="row"><b>Food:</b> ${p.food}</div>`);
          if (p.access) rows.push(`<div class="row"><b>Access:</b> ${p.access}</div>`);
        }
        return `<h4>${p.icon} ${p.id}. ${p.name}</h4>${rows.join('')}${popupMoreBtnHTML(expanded)}`;
      }

      const rows = [
        `<div class="row"><b>Category:</b> ${catLabel(p.type)}</div>`,
        p.building ? `<div class="row"><b>Building:</b> ${p.building}</div>` : '',
        p.location ? `<div class="row"><b>Location:</b> ${p.location}</div>` : '',
        p.walkMin ? `<div class="row"><b>Walk from KKL:</b> ${walkTimeHTML(p.walkMin)}</div>` : ''
      ].filter(Boolean);

      if (expanded){
        if (p.hours) rows.push(`<div class="row"><b>Opening hours:</b> ${p.hours}</div>`);
        if (p.info) rows.push(`<div class="row">${p.info}</div>`);
      }

      return `<h4>${p.icon} ${p.id}. ${p.name}</h4>${rows.join('')}${popupMoreBtnHTML(expanded)}`;
    }

    function positionPopup(anchorEl){
      const wrapRect = mapWrap.getBoundingClientRect();
      const aRect = anchorEl.getBoundingClientRect();

      const x = (aRect.left - wrapRect.left) + aRect.width / 2;
      const y = (aRect.top - wrapRect.top) + aRect.height / 2;

      const pad = 8, gap = 10;
      const w = popup.offsetWidth, h = popup.offsetHeight;

      let left = x + gap;
      let top = y - 8;
      if (left + w > wrapRect.width - pad) left = x - w - gap;
      if (left < pad) left = pad;
      if (top < pad) top = pad;
      if (top + h > wrapRect.height - pad) top = wrapRect.height - h - pad;

      popup.style.left = left + 'px';
      popup.style.top = top + 'px';
    }

    function openPopup(anchorEl, html){
      if (!anchorEl) return;
      popup.innerHTML = html;
      popup.style.display = 'block';
      popup.scrollTop = 0;
      activeAnchorEl = anchorEl;

      if (isMobile()){
        popup.classList.add('mobile-sheet');
      } else {
        popup.classList.remove('mobile-sheet');
        positionPopup(anchorEl);
      }
    }

    function openPointPopup(point, anchorEl){
      currentPopupPoint = point;
      popupExpanded = !isMobile();
      openPopup(anchorEl, popupHTML(point, popupExpanded));
    }

    function focusPoint(p){
      if (currentMode === 'route') return;
      clearActive();

      const marker = markerById.get(p.id);
      const btn = listBtnById.get(p.id);
      if (marker) marker.classList.add('active');
      if (btn) btn.classList.add('active');

      zoomToPoint(p.x, p.y, isMobile() ? 1.22 : 1.45);
      setTimeout(() => openPointPopup(p, marker), 120);

      if (isMobile()) setMobileTab('map');
    }

    function removePoiMarkers(){
      document.querySelectorAll('.marker.poi').forEach(el => el.remove());
      markerById.clear();
    }

    function createMarker(p){
      const m = document.createElement('button');
      m.className = 'marker poi';
      m.style.left = p.x + '%';
      m.style.top = p.y + '%';
      m.innerHTML = p.icon;
      m.title = p.name;
      m.dataset.type = p.type;
      m.addEventListener('click', e => {
        e.stopPropagation();
        focusPoint(p);
      });
      mapStage.appendChild(m);
      markerById.set(p.id, m);
    }

    function createHereMarker(){
      if (hereMarkerEl) return;
      const h = document.createElement('button');
      h.className = 'marker here';
      h.style.left = HERE.x + '%';
      h.style.top = HERE.y + '%';
      h.style.zIndex = '60';
      h.innerHTML = '📍';
      h.title = "I'm here (KKL)";
      h.addEventListener('click', e => {
        e.stopPropagation();
        currentPopupPoint = null;
        popupExpanded = false;
        zoomToPoint(HERE.x, HERE.y, isMobile()?1.22:1.42);
        openPopup(h, `<h4>📍 KKL Building</h4><div class="row">You are here.</div>`);
      });
      mapStage.appendChild(h);
      hereMarkerEl = h;
    }

    function renderList(){
      const data = getActiveData();
      list.innerHTML = '';
      listBtnById.clear();

      data.items.forEach(p => {
        const li = document.createElement('li');
        const b = document.createElement('button');
        b.innerHTML = `
          <div class="i1">${p.icon} ${p.id}. ${p.name}</div>
          <div class="i2">${catLabel(p.type)} ${p.building ? `• ${p.location ? p.location + ', ' : ''}${p.building}` : ''}</div>
          <div class="i3">${p.walkMin ? walkTimeHTML(p.walkMin)+' from KKL' : ''}</div>
        `;
        b.addEventListener('click', () => focusPoint(p));
        li.appendChild(b);
        list.appendChild(li);
        listBtnById.set(p.id, b);
      });
    }

    function renderFilterBar(){
      const data = getActiveData();
      filterBar.innerHTML = '';
      if (currentMode === 'route') return;

      const allChip = document.createElement('button');
      allChip.className = 'chip active';
      allChip.textContent = 'All';
      allChip.dataset.type = 'all';
      filterBar.appendChild(allChip);

      data.categories.forEach(c => {
        const chip = document.createElement('button');
        chip.className = 'chip';
        chip.textContent = `${c.icon} ${c.label}`;
        chip.dataset.type = c.key;
        filterBar.appendChild(chip);
      });

      filterBar.querySelectorAll('.chip').forEach(chip => {
        chip.addEventListener('click', () => {
          const t = chip.dataset.type;
          if (t === 'all'){
            selectedTypes = null;
          } else {
            if (!selectedTypes) selectedTypes = new Set();
            if (selectedTypes.has(t)) selectedTypes.delete(t); else selectedTypes.add(t);
            if (selectedTypes.size === 0) selectedTypes = null;
          }
          paintFilterState();
          applyFilter();
        });
      });

      paintFilterState();
    }

    function paintFilterState(){
      filterBar.querySelectorAll('.chip').forEach(ch => ch.classList.remove('active'));
      const all = filterBar.querySelector('[data-type="all"]');
      if (!selectedTypes || selectedTypes.size === 0){
        all && all.classList.add('active');
      } else {
        selectedTypes.forEach(t => {
          const el = filterBar.querySelector(`[data-type="${t}"]`);
          if (el) el.classList.add('active');
        });
      }
    }

    function renderLegend(){
      const data = getActiveData();
      legend.innerHTML = '';
      if (currentMode === 'route') return;

      data.categories.forEach(c => {
        const s = document.createElement('span');
        s.className = 'chip';
        s.textContent = `${c.icon} ${c.label}`;
        legend.appendChild(s);
      });

      const here = document.createElement('span');
      here.className = 'chip';
      here.textContent = '📍 I’m here (KKL)';
      legend.appendChild(here);
    }

    function applyFilter(){
      if (currentMode === 'route') return;
      const data = getActiveData();
      let count = 0;

      data.items.forEach(p => {
        const show = !selectedTypes || selectedTypes.has(p.type);
        const marker = markerById.get(p.id);
        const btn = listBtnById.get(p.id);

        if (marker) marker.style.display = show ? 'flex' : 'none';
        if (btn) btn.closest('li').style.display = show ? '' : 'none';
        if (show) count++;
      });

      listCount.textContent = count;
      popup.style.display = 'none';
      activeAnchorEl = null;
      currentPopupPoint = null;
      popupExpanded = false;
      clearActive();
    }

    // ---------------- ROUTE ----------------
    function showRouteHint(msg){ routeHint.style.display='block'; routeHint.textContent=msg; }
    function hideRouteHint(){ routeHint.style.display='none'; routeHint.textContent=''; }

    function clearRoute(){
      routeLayer.innerHTML = '';
      if (walkerEl) { walkerEl.remove(); walkerEl = null; }
      if (stationEl) { stationEl.remove(); stationEl = null; }
      if (routeAnimId) { cancelAnimationFrame(routeAnimId); routeAnimId = null; }
      hideRouteHint();
    }

    function pathMetrics(path){
      const cum=[0];
      for(let i=1;i<path.length;i++){
        const dx=path[i].x-path[i-1].x, dy=path[i].y-path[i-1].y;
        cum[i]=cum[i-1]+Math.hypot(dx,dy);
      }
      return {cum,total:cum[cum.length-1]};
    }

    function pointAt(path,cum,d){
      if (d<=0) return path[0];
      const total = cum[cum.length-1];
      if (d >= total) return path[path.length - 1];

      let i=1;
      while(i<cum.length && cum[i]<d) i++;
      const d0=cum[i-1], d1=cum[i];
      const t=(d-d0)/(d1-d0);

      return {
        x: path[i-1].x + (path[i].x - path[i-1].x) * t,
        y: path[i-1].y + (path[i].y - path[i-1].y) * t
      };
    }

    function drawRouteToKKL(stationKey){
      const route = ROUTES_TO_KKL[stationKey];
      if (!route) return;
      lastRouteStationKey = stationKey;

      clearRoute();

      if (routeFsExitTimer){
        clearTimeout(routeFsExitTimer);
        routeFsExitTimer = null;
      }
      if (isMobile() && currentMode === 'route'){
        setRouteFullscreen(true);
      }

      popup.style.display = 'none';
      activeAnchorEl = null;
      currentPopupPoint = null;
      popupExpanded = false;
      clearActive();

      // draw route polyline in SVG (0..100 map coords)
      const ns = "http://www.w3.org/2000/svg";
      const poly = document.createElementNS(ns, "polyline");
      poly.setAttribute("points", route.path.map(p => `${p.x},${p.y}`).join(" "));
      poly.setAttribute("fill", "none");
      poly.setAttribute("stroke", "#2563eb");
      poly.setAttribute("stroke-width", "1.15");
      poly.setAttribute("stroke-linecap", "round");
      poly.setAttribute("stroke-linejoin", "round");
      routeLayer.appendChild(poly);

      const start = route.path[0];
      const end = route.path[route.path.length - 1];

      const startDot = document.createElementNS(ns, "circle");
      startDot.setAttribute("cx", start.x);
      startDot.setAttribute("cy", start.y);
      startDot.setAttribute("r", "1.1");
      startDot.setAttribute("fill", "#0ea5e9");
      routeLayer.appendChild(startDot);

      const endDot = document.createElementNS(ns, "circle");
      endDot.setAttribute("cx", end.x);
      endDot.setAttribute("cy", end.y);
      endDot.setAttribute("r", "1.25");
      endDot.setAttribute("fill", "#dc2626");
      routeLayer.appendChild(endDot);

      // station marker
      stationEl = document.createElement('button');
      stationEl.className = 'marker poi';
      stationEl.style.left = `${start.x}%`;
      stationEl.style.top = `${start.y}%`;
      stationEl.style.zIndex = '28';
      stationEl.innerHTML = '🚉';
      stationEl.title = `${route.name} (tap to replay)`;
      stationEl.addEventListener('click', (e) => {
        e.stopPropagation();
        drawRouteToKKL(stationKey);
      });
      mapStage.appendChild(stationEl);

      // walker marker
      walkerEl = document.createElement('button');
      walkerEl.className = 'marker walker';
      walkerEl.style.left = `${start.x}%`;
      walkerEl.style.top = `${start.y}%`;
      walkerEl.style.zIndex = '29';
      walkerEl.textContent = '🚶';
      walkerEl.title = 'Replay route';
      walkerEl.addEventListener('click', (e) => {
        e.stopPropagation();
        drawRouteToKKL(stationKey);
      });
      mapStage.appendChild(walkerEl);

      showRouteHint(`From ${route.name}: follow the blue line to KKL 📍`);

      // fit/center route nicely when opened
      const xs = route.path.map(p => p.x);
      const ys = route.path.map(p => p.y);
      const minX = Math.min(...xs), maxX = Math.max(...xs);
      const minY = Math.min(...ys), maxY = Math.max(...ys);
      const centerX = (minX + maxX) / 2;
      const centerY = (minY + maxY) / 2;
      zoomToPoint(centerX, centerY, isMobile() ? 1.25 : 1.45);

      const {cum,total} = pathMetrics(route.path);
      const milestones = (route.milestones || []).map(m => ({
        d: cum[m.index],
        shown: false,
        message: m.message
      }));

      const duration = 11000;
      const t0 = performance.now();

      function frame(now){
        const t = Math.min((now - t0) / duration, 1);
        const d = total * t;
        const pt = pointAt(route.path, cum, d);

        walkerEl.style.left = `${pt.x}%`;
        walkerEl.style.top = `${pt.y}%`;

        milestones.forEach(m => {
          if (!m.shown && d >= m.d){
            m.shown = true;
            showRouteHint(m.message);
          }
        });

        if (t < 1){
          routeAnimId = requestAnimationFrame(frame);
        } else {
          routeAnimId = null;
          showRouteHint('✅ You have arrived at KKL Building.');

          if (isMobile() && currentMode === 'route'){
            if (routeFsExitTimer) clearTimeout(routeFsExitTimer);
            routeFsExitTimer = setTimeout(() => {
              setRouteFullscreen(false);
            }, 3000);
          }
        }
      }
      routeAnimId = requestAnimationFrame(frame);
    }

    // ---------------- MOBILE ROUTE FULLSCREEN ----------------
    function setRouteFullscreen(on){
      if (!isMobile()) return;
      document.body.classList.toggle('route-mobile-fs', on);
    }

    function updateMobileRouteUI(){
      const inRouteMobile = isMobile() && currentMode === 'route';
      document.body.classList.toggle('route-mobile', inRouteMobile);

      if (!inRouteMobile){
        setRouteFullscreen(false);
        if (routeFsExitTimer){
          clearTimeout(routeFsExitTimer);
          routeFsExitTimer = null;
        }
      } else {
        listPanel?.classList.remove('open');
        setMobileTab('map');
      }
    }

    // ---------------- MODE ----------------
    function switchMode(mode){
      currentMode = mode;
      selectedTypes = null;
      clearRoute();
      popup.style.display = 'none';
      activeAnchorEl = null;
      currentPopupPoint = null;
      popupExpanded = false;
      clearActive();

      foodModeBtn.classList.toggle('active', mode==='food');
      visitModeBtn.classList.toggle('active', mode==='visit');
      routeModeBtn.classList.toggle('active', mode==='route');

      if (mode === 'route'){
        mapTitle.textContent = 'HKU Main Campus Map (Route to KKL)';
        mapNote.textContent = 'Select your MTR station exit to view walking route.';
        mapNoteInline.textContent = mapNote.textContent;

        removePoiMarkers();
        list.innerHTML = '';
        listCount.textContent = '0';
        filterBar.innerHTML = '';
        legend.innerHTML = '';

        resetView();
        stationPrompt.classList.add('show');
        if (isMobile()) setMobileTab('map');
        updateMobileRouteUI();
        return;
      }

      stationPrompt.classList.remove('show');

      const data = getActiveData();
      mapTitle.textContent = data.title;
      mapNote.textContent = data.note;
      mapNoteInline.textContent = data.note;
      listLabel.textContent = data.listLabel;

      removePoiMarkers();
      data.items.forEach(createMarker);
      renderList();
      renderFilterBar();
      renderLegend();
      applyFilter();
      resetView();

      updateMobileRouteUI();
    }

    // ---------------- MOBILE MAP/LIST TABS ----------------
    function setMobileTab(tab){
      if (!isMobile()) return;
      const showList = tab === 'list';
      listPanel.classList.toggle('open', showList);
      mapTabBtn.classList.toggle('active', !showList);
      listTabBtn.classList.toggle('active', showList);
    }

    mapTabBtn?.addEventListener('click', ()=> setMobileTab('map'));
    listTabBtn?.addEventListener('click', ()=> setMobileTab('list'));

    drawerHandle?.addEventListener('click', ()=>{
      if (!isMobile()) return;
      if (currentMode === 'route') return;
      listPanel.classList.toggle('open');
      const open = listPanel.classList.contains('open');
      mapTabBtn.classList.toggle('active', !open);
      listTabBtn.classList.toggle('active', open);
    });

    // ---------------- EVENTS ----------------
    foodModeBtn.addEventListener('click', ()=>switchMode('food'));
    visitModeBtn.addEventListener('click', ()=>switchMode('visit'));
    routeModeBtn.addEventListener('click', ()=>switchMode('route'));

    cancelStationPrompt.addEventListener('click', ()=> stationPrompt.classList.remove('show'));
    stationPrompt.querySelectorAll('[data-station]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        stationPrompt.classList.remove('show');
        drawRouteToKKL(btn.dataset.station);
      });
    });

    // More button (mobile popup)
    popup.addEventListener('click', (e)=>{
      const moreBtn = e.target.closest('[data-popup-more="1"]');
      if (!moreBtn) return;
      e.stopPropagation();
      if (!currentPopupPoint) return;
      popupExpanded = true;
      openPopup(activeAnchorEl, popupHTML(currentPopupPoint, true));
    });

    resetZoomBtn.addEventListener('click', ()=>{
      resetView();
      popup.style.display = 'none';
      activeAnchorEl = null;
      currentPopupPoint = null;
      popupExpanded = false;
      clearActive();
    });

    // close popup when tapping blank map
    mapWrap.addEventListener('click', (e)=>{
      if (e.target.closest('.marker')) return;
      if (popup.contains(e.target)) return;
      popup.style.display = 'none';
      activeAnchorEl = null;
      currentPopupPoint = null;
      popupExpanded = false;
      clearActive();
    });

    // wheel zoom (desktop / non-route)
    mapWrap.addEventListener('wheel', (e)=>{
      if (currentMode === 'route') return;
      e.preventDefault();
      const delta = e.deltaY < 0 ? 0.14 : -0.14;
      zoomAt(e.clientX, e.clientY, scale + delta);
    }, {passive:false});

    // pointer pan + touch pinch
    let dragging = false;
    let lastX = 0, lastY = 0;
    let pinchStartDist = 0;
    let pinchStartScale = 1;
    let pinchCenter = null;

    function touchDist(t1,t2){
      const dx=t1.clientX-t2.clientX, dy=t1.clientY-t2.clientY;
      return Math.hypot(dx,dy);
    }
    function touchCenter(t1,t2){
      return {x:(t1.clientX+t2.clientX)/2, y:(t1.clientY+t2.clientY)/2};
    }

    mapWrap.addEventListener('pointerdown', (e)=>{
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      dragging = true;
      lastX = e.clientX; lastY = e.clientY;
      mapWrap.setPointerCapture(e.pointerId);
    });

    mapWrap.addEventListener('pointermove', (e)=>{
      if (!dragging) return;
      if (scale <= 1) return;
      tx += (e.clientX - lastX);
      ty += (e.clientY - lastY);
      lastX = e.clientX; lastY = e.clientY;
      clampPan();
      applyTransform();
    });

    mapWrap.addEventListener('pointerup', ()=> dragging=false);
    mapWrap.addEventListener('pointercancel', ()=> dragging=false);

    mapWrap.addEventListener('touchstart', (e)=>{
      if (e.touches.length === 2){
        pinchStartDist = touchDist(e.touches[0], e.touches[1]);
        pinchStartScale = scale;
        pinchCenter = touchCenter(e.touches[0], e.touches[1]);
      }
    }, {passive:true});

    mapWrap.addEventListener('touchmove', (e)=>{
      if (e.touches.length === 2){
        e.preventDefault();
        const d = touchDist(e.touches[0], e.touches[1]);
        const ratio = d / pinchStartDist;
        zoomAt(pinchCenter.x, pinchCenter.y, pinchStartScale * ratio);
      }
    }, {passive:false});

    window.addEventListener('resize', ()=>{
      syncMapRatioFromImage();
      clampPan();
      applyTransform();

      if (!isMobile()){
        listPanel.classList.remove('open');
      }
      if (popup.style.display === 'block' && activeAnchorEl && !isMobile()){
        positionPopup(activeAnchorEl);
      }

      updateMobileRouteUI();
    });

    // ---------------- INIT ----------------
    const mobileTabs = document.querySelector('.mobile-tabs');
    if (isMobile() && mobileTabs && mapWrap && mapWrap.parentNode) {
      mapWrap.parentNode.insertBefore(mobileTabs, mapWrap); // move tabs above map
    }

    if (mapImage.complete) syncMapRatioFromImage();
    else mapImage.addEventListener('load', syncMapRatioFromImage);

    createHereMarker();
    switchMode('food');
    applyTransform();
    if (isMobile()) setMobileTab('map');
    updateMobileRouteUI();
  </script>
</body>
</html>
